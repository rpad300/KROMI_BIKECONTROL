<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0e0e0e">
<meta property="og:title" content="KROMI Live Tracking — Acompanhe em Tempo Real">
<meta property="og:description" content="Posicao, velocidade, bateria, rota e dados do ciclista em tempo real. Inclui perfil medico e contactos de emergencia.">
<meta property="og:image" content="https://www.kromi.online/pwa-512x512.png">

<title>KROMI Live Tracking</title>
<style>
  :root {
    --bg: #0e0e0e; --bg-card: #1a1919; --bg-header: #131313;
    --text: #fff; --text-muted: #888; --border: #262626;
  }
  body.light {
    --bg: #f5f5f5; --bg-card: #ffffff; --bg-header: #ffffff;
    --text: #111; --text-muted: #666; --border: #e0e0e0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; min-height: 100dvh; }

  /* Header */
  .header { background: var(--bg-header); padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; }
  .header-title { font-size: 11px; font-weight: 900; letter-spacing: 2px; color: #3fff8b; text-transform: uppercase; }
  .header-rider { font-size: 14px; color: #adaaaa; margin-top: 2px; }

  /* Map */
  #map-container { width: 100%; height: 55vh; min-height: 280px; background: #111; position: relative; }
  .map-overlay { position: absolute; top: 10px; right: 10px; z-index: 10; display: flex; flex-direction: column; gap: 6px; }

  /* Live badge */
  .live-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; background: rgba(255,51,51,0.15); border: 1px solid rgba(255,51,51,0.4); border-radius: 20px; font-size: 11px; font-weight: 800; color: #ff716c; letter-spacing: 1px; }
  .live-dot { width: 8px; height: 8px; background: #ff3333; border-radius: 50%; animation: pulse-dot 1.5s ease-in-out infinite; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

  .ended-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; background: rgba(251,191,36,0.15); border: 1px solid rgba(251,191,36,0.4); border-radius: 20px; font-size: 11px; font-weight: 800; color: #fbbf24; letter-spacing: 1px; }

  /* Container */
  .container { padding: 0 12px 12px; max-width: 520px; margin: 0 auto; }

  /* KPI Grid */
  .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 12px; }
  .kpi-cell { background: var(--bg-card); padding: 10px 8px; position: relative; padding-left: 14px; }
  .kpi-cell::before { content: ''; position: absolute; left: 0; top: 6px; bottom: 6px; width: 3px; border-radius: 2px; }
  .kpi-cell.green::before { background: #3fff8b; }
  .kpi-cell.amber::before { background: #fbbf24; }
  .kpi-cell.red::before { background: #ff716c; }
  .kpi-cell.blue::before { background: #6e9bff; }
  .kpi-cell.purple::before { background: #a78bfa; }
  .kpi-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 2px; }
  .kpi-value { font-size: 20px; font-weight: 900; font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace; line-height: 1.2; }
  .kpi-unit { font-size: 10px; font-weight: 500; color: var(--text-muted); margin-left: 2px; }

  /* Route progress */
  .route-section { background: var(--bg-card); border-radius: 10px; padding: 14px; margin-top: 12px; border: 1px solid var(--border); }
  .route-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #3fff8b; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .progress-bar { width: 100%; height: 8px; background: #262626; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #3fff8b, #22c55e); border-radius: 4px; transition: width 0.5s ease; }
  .route-stats { display: flex; justify-content: space-between; font-size: 12px; color: #adaaaa; }
  .route-name { font-size: 13px; color: #888; margin-top: 6px; font-style: italic; }

  /* Emergency section */
  .emergency-section { background: var(--bg-card); border-radius: 10px; padding: 14px; margin-top: 12px; border: 1px solid var(--border); }
  .emergency-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #ff716c; margin-bottom: 10px; }
  .call-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; text-decoration: none; color: inherit; }
  .call-emergency { background: #ff3333; color: #fff; font-size: 18px; }
  .nearby-place { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #1f1f1f; font-size: 13px; }
  .nearby-place:last-child { border-bottom: none; }
  .nearby-place .icon { font-size: 16px; }
  .nearby-place .name { flex: 1; color: #adaaaa; }
  .nearby-place .dist { color: #888; font-size: 11px; font-weight: 600; }

  /* Footer */
  .footer-bar { background: var(--bg-header); border-top: 1px solid var(--border); padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; margin-top: 12px; border-radius: 10px; }
  .last-update { font-size: 11px; color: var(--text-muted); }
  .last-update span { color: #adaaaa; font-weight: 600; }

  /* Loading / Error states */
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #262626; border-top-color: #3fff8b; border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; gap: 12px; text-align: center; padding: 20px; }
  .error-state .icon { font-size: 48px; }
  .error-state .title { font-size: 18px; font-weight: 700; }
  .error-state .msg { font-size: 13px; color: #888; max-width: 300px; }

  /* Session ended overlay */
  .session-ended-banner { background: rgba(251,191,36,0.1); border: 1px solid rgba(251,191,36,0.3); border-radius: 10px; padding: 14px; margin-top: 12px; text-align: center; }
  .session-ended-banner .title { font-size: 14px; font-weight: 800; color: #fbbf24; margin-bottom: 4px; }
  .session-ended-banner .sub { font-size: 12px; color: #888; }

  /* Pulsing marker CSS for map */
  .pulse-marker { position: relative; }
  .pulse-marker::after { content: ''; position: absolute; width: 30px; height: 30px; border-radius: 50%; background: rgba(63,255,139,0.3); top: 50%; left: 50%; transform: translate(-50%,-50%); animation: marker-pulse 2s ease-out infinite; }
  @keyframes marker-pulse { 0% { transform: translate(-50%,-50%) scale(0.5); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(2.5); opacity: 0; } }

  /* Tracking mode tags */
  .mode-tag { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
  .mode-tag-route { background: rgba(63,255,139,0.12); color: #3fff8b; border: 1px solid rgba(63,255,139,0.25); }
  .mode-tag-explore { background: rgba(110,155,255,0.12); color: #6e9bff; border: 1px solid rgba(110,155,255,0.25); }

  /* Mode badge */
  .mode-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; }
  .mode-eco { background: rgba(34,197,94,0.2); color: #22c55e; }
  .mode-tour { background: rgba(59,130,246,0.2); color: #3b82f6; }
  .mode-active { background: rgba(251,191,36,0.2); color: #fbbf24; }
  .mode-sport { background: rgba(239,68,68,0.2); color: #ef4444; }
  .mode-kromi { background: rgba(63,255,139,0.2); color: #3fff8b; }
  .mode-smart { background: rgba(167,139,250,0.2); color: #a78bfa; }

  /* Medical profile section */
  .medical-section { background: var(--bg-card); border-radius: 10px; padding: 14px; margin-top: 12px; border: 1px solid var(--border); }
  .medical-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #ff716c; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .medical-grid { display: grid; gap: 10px; }
  .medical-item { padding: 8px 0; border-bottom: 1px solid #1f1f1f; }
  .medical-item:last-child { border-bottom: none; }
  .medical-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: #666; margin-bottom: 4px; }
  .medical-value { font-size: 13px; color: #adaaaa; font-weight: 500; }
  .blood-badge { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 50%; background: rgba(255,51,51,0.15); border: 2px solid rgba(255,51,51,0.5); font-size: 22px; font-weight: 900; color: #ff3333; }
  .alert-tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; margin: 2px; }
  .tag-red { background: rgba(255,51,51,0.2); color: #ff5555; border: 1px solid rgba(255,51,51,0.3); }
  .tag-amber { background: rgba(255,204,0,0.2); color: #ffcc00; border: 1px solid rgba(255,204,0,0.3); }
  .tag-blue { background: rgba(110,155,255,0.2); color: #6e9bff; border: 1px solid rgba(110,155,255,0.3); }
  .ice-contact { display: flex; align-items: center; gap: 6px; padding: 8px 12px; background: #262626; border-radius: 6px; margin-top: 6px; text-decoration: none; color: #3fff8b; font-size: 13px; font-weight: 600; }
  .ice-contact:active { background: #333; }
  .donor-badge { display: inline-block; padding: 3px 8px; background: rgba(63,255,139,0.15); color: #3fff8b; border: 1px solid rgba(63,255,139,0.3); border-radius: 4px; font-size: 11px; font-weight: 700; }

  /* ═══════════════════════════════════════════════════════════ */
  /* MOBILE DEFAULT                                            */
  /* ═══════════════════════════════════════════════════════════ */
  .desktop-layout { display: block; }
  .right-panel { display: block; padding: 0 12px; }

  /* ═══════════════════════════════════════════════════════════ */
  /* TABLET: 2-column (768–1023px)                             */
  /* ═══════════════════════════════════════════════════════════ */
  @media (min-width: 768px) and (max-width: 1023px) {
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .header { width: 100%; padding: 10px 24px; flex-shrink: 0; }
    .desktop-layout { display: grid; grid-template-columns: 1fr 380px; gap: 0; width: 100%; flex: 1; min-height: 0; overflow: hidden; }
    #map-container { min-height: 0; grid-column: 1; grid-row: 1 / 3; }
    .data-panel { grid-column: 2; grid-row: 1; overflow-y: auto; padding: 0 12px 0; min-height: 0; }
    .right-panel { grid-column: 2; grid-row: 2; overflow-y: auto; padding: 0 12px 12px; min-height: 0; }
    .container { max-width: 100%; padding: 0; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .medical-grid { grid-template-columns: 1fr 1fr; }
    .footer-bar { margin: 12px 0; }
  }

  /* ═══════════════════════════════════════════════════════════ */
  /* DESKTOP: 3-column (≥1024px)                               */
  /* ═══════════════════════════════════════════════════════════ */
  @media (min-width: 1024px) {
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body { display: flex; flex-direction: column; }
    .header { width: 100%; padding: 10px 24px; flex-shrink: 0; }
    .desktop-layout { display: grid; grid-template-columns: 280px 1fr 320px; gap: 0; width: 100%; flex: 1; min-height: 0; overflow: hidden; }
    #map-container { height: 100% !important; min-height: 0; order: 2; overflow: hidden; }
    .data-panel { overflow-y: auto; min-height: 0; padding: 8px 10px; order: 1; border-right: 1px solid var(--border); }
    .right-panel { overflow-y: auto; min-height: 0; padding: 8px 10px; order: 3; border-left: 1px solid var(--border); display: block; }
    .container { max-width: 100%; padding: 0; }
    .kpi-grid { grid-template-columns: 1fr 1fr; }
    .kpi-value { font-size: 18px; }
    .medical-grid { grid-template-columns: 1fr; }
    .footer-bar { display: none; }
  }

  /* ═══════════════════════════════════════════════════════════ */
  /* WIDE DESKTOP (≥1400px)                                    */
  /* ═══════════════════════════════════════════════════════════ */
  @media (min-width: 1400px) {
    .desktop-layout { grid-template-columns: 320px 1fr 380px; }
    .kpi-grid { grid-template-columns: 1fr 1fr 1fr; }
    .kpi-value { font-size: 20px; }
    .medical-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<script>
// Unregister any PWA service worker so this page is served directly
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  }).then(() => {
    // If we were served from SW cache (index.html), reload to get the real live.html
    if (document.querySelector('#root') || document.querySelector('[data-reactroot]')) {
      location.reload();
    }
  });
}
</script>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <div style="color:#888;font-size:13px">A carregar tracking...</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const SB_URL = 'https://ctsuupvmmyjlrtjnxagv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0c3V1cHZtbXlqbHJ0am54YWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Njg3MTgsImV4cCI6MjA5MDU0NDcxOH0.VgpKrjxYirb9Gc7OZX-aHGJmGJ3QdDM5I7iXaWDmBXQ';
const MAPS_KEY = 'AIzaSyAeeHw69Wzy3OQuN6SbAhXjlhSxBlJPfa0';

const sbHeaders = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

const MODE_LABELS = { 1: 'ECO', 2: 'TOUR', 3: 'ACTIVE', 4: 'SPORT', 5: 'KROMI', 6: 'SMART' };
const MODE_CLASSES = { 1: 'mode-eco', 2: 'mode-tour', 3: 'mode-active', 4: 'mode-sport', 5: 'mode-kromi', 6: 'mode-smart' };

// State
let map = null;
let trailPolyline = null;
let positionMarker = null;
let positionCircle = null;
let lastPointId = null;
let sessionData = null;
let pollInterval = null;
let medicalProfile = null;
let lastMovingTs = Date.now();
let wasActive = false;
let weatherLastFetch = 0;
let allTrackPoints = [];
let groupRide = null;
let groupParticipants = [];
let groupMarkers = [];

// ═══════════════════════════════════════════════════════════
// MAIN
// ═══════════════════════════════════════════════════════════
async function init() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('t');

  if (!token) {
    showError('Link invalido', 'Este link nao contem um token de tracking valido.');
    return;
  }

  try {
    // 1. Fetch latest tracking session for this permanent token
    const sessionRes = await fetch(
      `${SB_URL}/rest/v1/tracking_sessions?token=eq.${encodeURIComponent(token)}&order=started_at.desc&limit=1&select=*`,
      { headers: sbHeaders }
    );
    const sessions = await sessionRes.json();

    if (!Array.isArray(sessions) || !sessions.length) {
      // No session yet — try to show rider info from emergency_profiles
      try {
        const profileRes = await fetch(
          `${SB_URL}/rest/v1/emergency_profiles?token=eq.${encodeURIComponent(token)}&active=eq.true&select=*&limit=1`,
          { headers: sbHeaders }
        );
        const profiles = await profileRes.json();
        if (Array.isArray(profiles) && profiles.length) {
          showNoSession(profiles[0]);
          return;
        }
      } catch (e) { console.warn('Could not fetch emergency profile:', e); }
      showError('Nenhuma sessao de tracking', 'Este rider ainda nao iniciou nenhuma sessao de tracking.');
      return;
    }

    sessionData = sessions[0];

    // 2. Fetch rider medical/emergency profile
    if (sessionData.user_id) {
      try {
        const profileRes = await fetch(
          `${SB_URL}/rest/v1/emergency_profiles?user_id=eq.${sessionData.user_id}&active=eq.true&select=*&limit=1`,
          { headers: sbHeaders }
        );
        const profiles = await profileRes.json();
        if (Array.isArray(profiles) && profiles.length) {
          medicalProfile = profiles[0];
        }
      } catch (e) { console.warn('Could not fetch medical profile:', e); }
    }

    // 3. Check if rider is in an active group ride
    if (sessionData.user_id) {
      try {
        const partRes = await fetch(
          `${SB_URL}/rest/v1/club_ride_participants?user_id=eq.${sessionData.user_id}&status=in.(confirmed,riding)&select=*,club_rides:club_ride_id(id,name,status,club_id)`,
          { headers: sbHeaders }
        );
        const parts = await partRes.json();

        if (Array.isArray(parts) && parts.length > 0) {
          const activePart = parts.find(p => p.club_rides?.status === 'active') || parts[0];
          if (activePart?.club_rides) {
            groupRide = activePart.club_rides;

            const allPartRes = await fetch(
              `${SB_URL}/rest/v1/club_ride_participants?club_ride_id=eq.${groupRide.id}&select=*`,
              { headers: sbHeaders }
            );
            const allParts = await allPartRes.json();
            if (Array.isArray(allParts)) {
              groupParticipants = allParts.filter(p => p.user_id !== sessionData.user_id);
            }
          }
        }
      } catch (e) { console.warn('Group ride fetch failed:', e); }
    }

    // 4. Fetch tracking points (breadcrumb trail)
    const pointsRes = await fetch(
      `${SB_URL}/rest/v1/tracking_points?session_id=eq.${sessionData.id}&order=recorded_at.asc&limit=10000`,
      { headers: sbHeaders }
    );
    const points = await pointsRes.json();
    const trackPoints = Array.isArray(points) ? points : [];

    // 5. Load Google Maps
    await loadGoogleMaps();

    // 6. Render
    renderPage(sessionData, trackPoints);

    // 7. Track initial active state for sound notification
    wasActive = sessionData.is_active;

    // 8. Start polling if active
    if (sessionData.is_active) {
      pollInterval = setInterval(() => pollUpdates(sessionData), 10000);
    }

  } catch (err) {
    console.error('Init error:', err);
    showError('Erro de ligacao', 'Nao foi possivel carregar os dados de tracking. Tente novamente.');
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function renderPage(session, points) {
  const isActive = session.is_active;
  const riderName = session.rider_name || 'Ciclista';
  const bikeName = session.bike_name || '';
  const lastPoint = points.length ? points[points.length - 1] : null;

  // Extract KPIs from session or last point
  const speed = lastPoint?.speed_kmh ?? session.current_speed_kmh ?? null;
  const avgSpeed = session.avg_speed_kmh ?? null;
  const distance = session.distance_km ?? lastPoint?.distance_km ?? null;
  const battery = lastPoint?.battery_pct ?? session.battery_pct ?? null;
  const range = session.range_km ?? null;
  const hr = lastPoint?.hr_bpm ?? session.hr_bpm ?? null;
  const power = lastPoint?.power_w ?? session.power_w ?? null;
  const cadence = lastPoint?.cadence_rpm ?? session.cadence_rpm ?? null;
  const gear = session.gear_display ?? (lastPoint?.gear ? lastPoint.gear : null);
  const elevation = lastPoint?.altitude_m ?? session.altitude_m ?? null;
  const eleGain = session.elevation_gain_m ?? null;
  const mode = lastPoint?.assist_mode ?? session.assist_mode ?? null;

  // Route progress
  const routeName = session.route_name ?? null;
  const routeTotalKm = session.route_total_km ?? null;
  const routeProgressPct = (routeTotalKm && distance) ? Math.min(100, (distance / routeTotalKm) * 100) : null;
  const routeEta = session.route_eta_min ?? null;

  let html = '';

  // Header
  html += `<div class="header">`;
  html += `<div style="flex:1;min-width:0">`;
  html += `<div class="header-title">KROMI LIVE TRACKING</div>`;
  html += `<div class="header-rider">${esc(riderName)}${bikeName ? ' &middot; ' + esc(bikeName) : ''}</div>`;
  if (routeName) {
    html += `<div style="margin-top:4px"><span class="mode-tag mode-tag-route">&#9873; ROTA: ${esc(routeName)}</span></div>`;
  } else {
    html += `<div style="margin-top:4px"><span class="mode-tag mode-tag-explore">&#127757; EXPLORAÇÃO LIVRE</span></div>`;
  }
  html += `</div>`;
  html += `<button onclick="document.body.classList.toggle('light')" style="background:var(--bg-card);border:1px solid var(--border);border-radius:6px;padding:6px 10px;cursor:pointer;font-size:14px;color:var(--text-muted);flex-shrink:0" title="Alternar tema">&#9728;/&#127769;</button>`;
  html += `</div>`;

  // Desktop: 3-column grid wrapper (left data-panel, center map, right panel)
  html += `<div class="desktop-layout">`;

  // ── LEFT: Data panel (KPIs, sparklines, weather, route, elevation, ETA) ──
  html += `<div class="data-panel">`;
  html += `<div class="container">`;

  // Medical profile at the top of left panel
  if (medicalProfile) {
    html += renderMedicalSection(medicalProfile);
  } else {
    html += `<div class="medical-section">`;
    html += `<div class="medical-title">&#9786; Rider</div>`;
    html += `<div style="display:flex;align-items:center;gap:12px;padding:8px">`;
    html += `<div style="width:56px;height:56px;border-radius:50%;background:#262626;border:2px solid #494847;display:flex;align-items:center;justify-content:center;font-size:22px;color:#555;flex-shrink:0">&#9786;</div>`;
    html += `<div>`;
    if (riderName) html += `<div style="font-size:15px;font-weight:800;color:#fff">${esc(riderName)}</div>`;
    if (bikeName) html += `<div style="font-size:11px;color:#888;margin-top:2px">${esc(bikeName)}</div>`;
    html += `<div style="font-size:10px;color:#555;margin-top:4px">Perfil medico nao disponivel</div>`;
    html += `</div></div></div>`;
  }

  // Session ended banner
  if (!isActive) {
    const endedAt = session.ended_at ? new Date(session.ended_at) : null;
    html += `<div class="session-ended-banner">`;
    html += `<div class="title">Ultima Sessao</div>`;
    html += `<div class="sub">${endedAt ? 'Terminada a ' + endedAt.toLocaleString('pt-PT', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' }) : 'O tracking inicia automaticamente quando a bike liga'}</div>`;
    html += `</div>`;
  }

  // Inactivity alert (only when session is active)
  if (isActive) {
    html += `<div id="inactivity-alert"></div>`;
  }

  // KPI Grid
  html += `<div class="kpi-grid" id="kpi-grid">`;
  html += kpiCell('Velocidade', formatNum(speed, 1), 'km/h', 'green');
  html += kpiCell('Vel. Media', formatNum(avgSpeed, 1), 'km/h', 'green');
  html += kpiCell('Distancia', formatNum(distance, 1), 'km', 'green');
  html += kpiCell('Bateria', battery != null ? battery + '' : '--', '%', batteryColor(battery));
  html += kpiCell('Autonomia', formatNum(range, 0), 'km', 'amber');
  html += kpiCell('FC', hr != null ? hr + '' : '--', 'bpm', 'red');
  html += kpiCell('Potencia', formatNum(power, 0), 'W', 'blue');
  html += kpiCell('Cadencia', formatNum(cadence, 0), 'rpm', 'blue');
  html += kpiCell('Gear', gear || '--', '', 'purple');
  html += kpiCell('Elevacao', formatNum(elevation, 0), 'm', 'green');
  html += kpiCell('Desnivel', eleGain != null ? '\u25B2' + Math.round(eleGain) : '--', 'm', 'green');
  html += kpiCellMode('Modo', mode);
  html += `</div>`;

  // Store tracking points for sparklines
  allTrackPoints = points;

  // Sparklines (Speed + HR history)
  html += renderSparklines(points);

  // Weather section
  html += `<div id="weather-section"></div>`;

  // Route progress (only if route data exists)
  if (routeName || routeTotalKm) {
    const pct = routeProgressPct ?? 0;
    const done = distance ?? 0;
    const total = routeTotalKm ?? 0;
    const remaining = Math.max(0, total - done);
    const etaStr = routeEta != null ? formatEta(routeEta) : '--';

    html += `<div class="route-section" id="route-section">`;
    html += `<div class="route-title">&#9873; Progresso da Rota</div>`;
    html += `<div class="progress-bar"><div class="progress-fill" style="width:${pct.toFixed(1)}%"></div></div>`;
    html += `<div class="route-stats">`;
    html += `<span>${done.toFixed(1)}/${total.toFixed(1)} km</span>`;
    html += `<span style="font-weight:700;color:#3fff8b">${Math.round(pct)}%</span>`;
    html += `<span>ETA ${etaStr}</span>`;
    html += `</div>`;
    if (routeName) html += `<div class="route-name">${esc(routeName)}</div>`;
    html += `</div>`;
  }

  // Elevation profile (when route has elevation data)
  if (session.route_elevation_profile && session.route_elevation_profile.length > 2) {
    const elevData = session.route_elevation_profile;
    const totalDist = elevData[elevData.length - 1].d;
    let minEle = Infinity, maxEle = -Infinity;
    elevData.forEach(p => { if (p.e < minEle) minEle = p.e; if (p.e > maxEle) maxEle = p.e; });
    const eleRange = maxEle - minEle || 1;

    const w = 460, h = 80, pad = 4;
    const hInner = h - pad * 2;

    // Build SVG path
    let pathD = '', fillD = '';
    elevData.forEach((p, i) => {
      const x = (p.d / totalDist) * w;
      const y = pad + hInner - ((p.e - minEle) / eleRange) * hInner;
      pathD += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(1)} ${y.toFixed(1)} `;
    });
    fillD = pathD + ` L ${w} ${pad + hInner} L 0 ${pad + hInner} Z`;

    // Current position on profile
    const doneDist = (session.distance_km || 0) * 1000;
    const markerX = totalDist > 0 ? (doneDist / totalDist) * w : 0;
    // Find elevation at current distance
    let markerY = pad + hInner / 2;
    for (let i = 0; i < elevData.length - 1; i++) {
      if (elevData[i].d <= doneDist && elevData[i+1].d >= doneDist) {
        const t = (doneDist - elevData[i].d) / (elevData[i+1].d - elevData[i].d);
        const ele = elevData[i].e + t * (elevData[i+1].e - elevData[i].e);
        markerY = pad + hInner - ((ele - minEle) / eleRange) * hInner;
        break;
      }
    }

    html += `<div class="route-section">`;
    html += `<div class="route-title">&#9968; Perfil de Altimetria</div>`;
    html += `<div style="position:relative;background:#111;border-radius:6px;padding:6px;overflow:hidden">`;
    html += `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`;
    html += `<defs><linearGradient id="eGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3fff8b"/><stop offset="100%" stop-color="#0e0e0e"/></linearGradient></defs>`;
    html += `<path d="${fillD}" fill="url(#eGrad)" opacity="0.25"/>`;
    // Done portion (bright)
    html += `<clipPath id="doneClip"><rect x="0" y="0" width="${markerX}" height="${h}"/></clipPath>`;
    html += `<path d="${pathD}" stroke="#3fff8b" stroke-width="2" fill="none" clip-path="url(#doneClip)"/>`;
    // Remaining (dim)
    html += `<clipPath id="remClip"><rect x="${markerX}" y="0" width="${w - markerX}" height="${h}"/></clipPath>`;
    html += `<path d="${pathD}" stroke="#3fff8b" stroke-width="1" fill="none" opacity="0.3" clip-path="url(#remClip)"/>`;
    // Position marker
    html += `<line x1="${markerX}" y1="0" x2="${markerX}" y2="${h}" stroke="#fff" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>`;
    html += `<circle cx="${markerX}" cy="${markerY}" r="4" fill="#3fff8b" stroke="#fff" stroke-width="1.5"/>`;
    html += `</svg>`;
    // Labels
    html += `<div style="position:absolute;top:4px;left:10px;font-size:8px;color:#666">${Math.round(maxEle)}m</div>`;
    html += `<div style="position:absolute;bottom:4px;right:10px;font-size:8px;color:#666">${Math.round(minEle)}m</div>`;
    html += `</div>`;
    html += `</div>`;
  }

  // ETA to home (only in exploration mode — no active route)
  if (!routeName) {
    html += `<div id="eta-home-section"></div>`;
  }

  // Footer (visible on mobile/tablet, hidden on desktop via CSS)
  html += `<div class="footer-bar" id="footer-bar">`;
  html += `<div class="last-update">Ultima atualizacao: <span id="last-update-time">${formatTime(new Date())}</span></div>`;
  if (isActive) {
    html += `<div class="live-badge" style="font-size:9px;padding:3px 8px"><span class="live-dot" style="width:6px;height:6px"></span>LIVE</div>`;
  }
  html += `</div>`;

  html += `</div>`; // container
  html += `</div>`; // data-panel

  // ── CENTER: Map ──
  html += `<div id="map-container">`;
  html += `<div class="map-overlay">`;
  if (isActive) {
    html += `<div class="live-badge"><span class="live-dot"></span>LIVE</div>`;
  } else {
    html += `<div class="ended-badge">TERMINADA</div>`;
  }
  html += `</div>`;
  html += `</div>`;

  // ── RIGHT: Emergency, Home distance, Group ──
  html += `<div class="right-panel">`;

  // Home proximity countdown (Feature 7)
  html += `<div id="home-proximity"></div>`;

  // Group ride section
  if (groupRide && groupParticipants.length > 0) {
    html += `<div class="emergency-section">`;
    html += `<div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6e9bff;margin-bottom:10px">&#128101; Grupo: ${esc(groupRide.name)}</div>`;
    html += `<div style="font-size:10px;color:#888;margin-bottom:8px">${groupParticipants.length} membro${groupParticipants.length > 1 ? 's' : ''} no grupo</div>`;

    for (const p of groupParticipants) {
      const name = p.display_name || 'Rider';
      const isOnline = p.status === 'riding';

      html += `<div style="background:#262626;border-radius:8px;padding:10px;margin-bottom:6px;border-left:3px solid ${isOnline ? '#3fff8b' : '#494847'}">`;
      html += `<div style="display:flex;align-items:center;gap:8px">`;
      if (p.avatar_url) {
        html += `<img src="${esc(p.avatar_url)}" style="width:32px;height:32px;border-radius:50%;object-fit:cover" />`;
      } else {
        html += `<div style="width:32px;height:32px;border-radius:50%;background:#333;display:flex;align-items:center;justify-content:center;font-size:14px;color:#666">&#128100;</div>`;
      }
      html += `<div style="flex:1">`;
      html += `<div style="font-size:12px;font-weight:700;color:#fff">${esc(name)}</div>`;
      html += `<div style="font-size:10px;color:${isOnline ? '#3fff8b' : '#666'}">${isOnline ? '&#9679; Online' : '&#9675; Offline'}</div>`;
      html += `</div>`;
      if (p.phone) {
        html += `<a href="tel:${esc(p.phone)}" style="padding:6px 10px;background:#1a1919;border-radius:6px;color:#6e9bff;text-decoration:none;font-size:10px;font-weight:700">&#128222;</a>`;
      }
      html += `</div></div>`;
    }

    html += `</div>`;
  }

  // Emergency contacts
  html += `<div class="emergency-section">`;
  // Distance from home — how long to reach the rider by car
  html += `<div id="home-distance-section"></div>`;

  html += `<div class="emergency-title">&#9888; Emergencia</div>`;
  html += `<a href="tel:112" class="call-btn call-emergency">&#128222; 112 — Numero Europeu de Emergencia</a>`;
  html += `<div style="margin-top:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#ff716c;margin-bottom:8px">&#128205; Servicos mais proximos do rider</div>`;
  html += `<div id="nearby-places" style="margin-top:4px"></div>`;

  // Feature 3: Auto-share notification stub
  html += `<div style="background:var(--bg-card);border-radius:8px;padding:10px;margin-top:8px;border:1px solid var(--border)">`;
  html += `<div style="font-size:10px;font-weight:700;color:#6e9bff;margin-bottom:4px">&#128233; Notificacoes Automaticas</div>`;
  html += `<div style="font-size:11px;color:var(--text-muted)">Os contactos de emergencia sao notificados automaticamente quando o rider inicia uma pedalada.</div>`;
  html += `</div>`;

  html += `</div>`; // emergency-section

  html += `</div>`; // right-panel
  html += `</div>`; // desktop-layout

  document.getElementById('app').innerHTML = html;

  // Init map after DOM is ready
  requestAnimationFrame(() => {
    initMap(points, isActive);

    // Show group member markers on map
    if (groupParticipants.length > 0) {
      showGroupMembers();
    }

    // Fetch nearby places + home distance if we have a position
    if (lastPoint?.lat && lastPoint?.lng) {
      fetchNearbyPlaces(lastPoint.lat, lastPoint.lng);
      calculateHomeDistance(lastPoint.lat, lastPoint.lng);
      // ETA to home (cycling) — only in exploration mode
      if (!session.route_name) calculateETAToHome(lastPoint.lat, lastPoint.lng);
      // Weather at rider location
      fetchRiderWeather(lastPoint.lat, lastPoint.lng);
    }
  });
}

function kpiCell(label, value, unit, colorClass) {
  return `<div class="kpi-cell ${colorClass}">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value">${value}<span class="kpi-unit">${unit}</span></div>
  </div>`;
}

function kpiCellMode(label, mode) {
  const modeLabel = mode != null ? (MODE_LABELS[mode] || mode) : '--';
  const modeClass = mode != null ? (MODE_CLASSES[mode] || '') : '';
  return `<div class="kpi-cell green">
    <div class="kpi-label">${label}</div>
    <div class="kpi-value"><span class="mode-badge ${modeClass}">${modeLabel}</span></div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════════
function loadGoogleMaps() {
  return new Promise((resolve, reject) => {
    if (window.google?.maps) { resolve(); return; }
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&libraries=geometry,places`;
    script.onload = resolve;
    script.onerror = () => reject(new Error('Failed to load Google Maps'));
    document.head.appendChild(script);
  });
}

function initMap(points, isActive) {
  const container = document.getElementById('map-container');
  if (!container || !window.google?.maps) return;

  const pts = points.filter(p => p.lat && p.lng);

  // Default center (Porto, Portugal) if no points
  const defaultCenter = { lat: 41.1579, lng: -8.6291 };
  const center = pts.length ? { lat: pts[pts.length - 1].lat, lng: pts[pts.length - 1].lng } : defaultCenter;

  map = new google.maps.Map(container, {
    center: center,
    zoom: pts.length ? 14 : 10,
    mapTypeId: 'hybrid',
    disableDefaultUI: true,
    zoomControl: true,
    gestureHandling: 'greedy',
    styles: [],
  });

  if (!pts.length) return;

  // Breadcrumb trail polyline
  const path = pts.map(p => ({ lat: p.lat, lng: p.lng }));
  trailPolyline = new google.maps.Polyline({
    path: path,
    strokeColor: '#3fff8b',
    strokeOpacity: 0.9,
    strokeWeight: 4,
    map: map,
  });

  // Start marker
  new google.maps.Marker({
    position: path[0],
    map: map,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 6,
      fillColor: '#ffffff',
      fillOpacity: 1,
      strokeColor: '#3fff8b',
      strokeWeight: 2,
    },
    title: 'Inicio',
  });

  // Current position marker (pulsing)
  const lastPos = path[path.length - 1];
  const heading = pts.length > 1 ? computeHeading(pts[pts.length - 2], pts[pts.length - 1]) : 0;

  positionMarker = new google.maps.Marker({
    position: lastPos,
    map: map,
    icon: {
      path: google.maps.SymbolPath.FORWARD_CLOSED_ARROW,
      scale: 6,
      fillColor: isActive ? '#3fff8b' : '#fbbf24',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 2,
      rotation: heading,
    },
    title: isActive ? 'Posicao actual' : 'Ultima posicao',
    zIndex: 100,
  });

  // Accuracy/pulse circle
  positionCircle = new google.maps.Circle({
    center: lastPos,
    radius: 25,
    map: map,
    fillColor: isActive ? '#3fff8b' : '#fbbf24',
    fillOpacity: 0.15,
    strokeColor: isActive ? '#3fff8b' : '#fbbf24',
    strokeOpacity: 0.4,
    strokeWeight: 1,
  });

  // Fit bounds
  const bounds = new google.maps.LatLngBounds();
  pts.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
  map.fitBounds(bounds, 40);

  // Store last point id for incremental fetch
  if (pts.length) {
    lastPointId = points[points.length - 1].id;
  }
}

// ═══════════════════════════════════════════════════════════
// GROUP MEMBERS ON MAP
// ═══════════════════════════════════════════════════════════
async function createAvatarIcon(avatarUrl, size = 40) {
  return new Promise((resolve) => {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      // Draw circular clip
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      ctx.drawImage(img, 0, 0, size, size);
      // Draw border
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 1, 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.stroke();
      resolve({
        url: canvas.toDataURL(),
        scaledSize: new google.maps.Size(size, size),
        anchor: new google.maps.Point(size/2, size/2),
      });
    };
    img.onerror = () => {
      // Fallback to circle
      resolve({
        path: google.maps.SymbolPath.CIRCLE,
        scale: 10,
        fillColor: '#6e9bff',
        fillOpacity: 1,
        strokeColor: '#ffffff',
        strokeWeight: 2,
      });
    };
    img.src = avatarUrl;
  });
}

async function showGroupMembers() {
  // Clear old markers
  groupMarkers.forEach(m => m.setMap(null));
  groupMarkers = [];

  if (!groupParticipants.length || !map) return;

  const riderPos = positionMarker?.getPosition();

  for (const p of groupParticipants) {
    let lat = p.last_lat, lng = p.last_lng, speed = p.last_speed;
    let name = p.display_name || 'Rider';

    // Try to get live position from their tracking_session
    if (p.tracking_token) {
      try {
        const tsRes = await fetch(
          `${SB_URL}/rest/v1/tracking_sessions?token=eq.${encodeURIComponent(p.tracking_token)}&order=started_at.desc&limit=1&select=lat,lng,speed_kmh,is_active,rider_name`,
          { headers: sbHeaders }
        );
        const tsList = await tsRes.json();
        if (Array.isArray(tsList) && tsList.length && tsList[0].lat) {
          lat = tsList[0].lat;
          lng = tsList[0].lng;
          speed = tsList[0].speed_kmh;
          if (tsList[0].rider_name) name = tsList[0].rider_name;
        }
      } catch {}
    }

    if (!lat || !lng) continue;

    // Calculate distance from main rider
    let distStr = '';
    if (riderPos) {
      const dist = google.maps.geometry.spherical.computeDistanceBetween(
        riderPos, new google.maps.LatLng(lat, lng)
      );
      distStr = dist < 1000 ? Math.round(dist) + 'm' : (dist/1000).toFixed(1) + 'km';
    }

    // Create marker — use avatar if available, fallback to blue circle
    const markerIcon = p.avatar_url
      ? await createAvatarIcon(p.avatar_url, 40)
      : {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 8,
          fillColor: '#6e9bff',
          fillOpacity: 1,
          strokeColor: '#ffffff',
          strokeWeight: 2,
        };

    const marker = new google.maps.Marker({
      position: { lat, lng },
      map: map,
      icon: markerIcon,
      title: name,
      zIndex: 50,
    });

    // Info window with name, distance, speed, contact
    const content = `
      <div style="background:#1a1919;color:#fff;padding:10px;border-radius:8px;min-width:150px;font-family:system-ui">
        <div style="font-weight:800;font-size:14px;margin-bottom:4px">${esc(name)}</div>
        ${speed != null ? `<div style="font-size:11px;color:#3fff8b">${Math.round(speed)} km/h</div>` : ''}
        ${distStr ? `<div style="font-size:11px;color:#888;margin-top:2px">A ${distStr} de distancia</div>` : ''}
        ${p.phone ? `<a href="tel:${esc(p.phone)}" style="display:block;margin-top:6px;padding:6px;background:#262626;border-radius:4px;color:#6e9bff;text-align:center;text-decoration:none;font-size:11px;font-weight:700">&#128222; Ligar</a>` : ''}
      </div>`;

    const infoWindow = new google.maps.InfoWindow({ content });
    marker.addListener('click', () => infoWindow.open(map, marker));

    groupMarkers.push(marker);
  }
}

function computeHeading(p1, p2) {
  if (!p1 || !p2) return 0;
  const dLng = (p2.lng - p1.lng) * Math.PI / 180;
  const lat1 = p1.lat * Math.PI / 180;
  const lat2 = p2.lat * Math.PI / 180;
  const x = Math.sin(dLng) * Math.cos(lat2);
  const y = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLng);
  return (Math.atan2(x, y) * 180 / Math.PI + 360) % 360;
}

// ═══════════════════════════════════════════════════════════
// POLLING
// ═══════════════════════════════════════════════════════════
async function pollUpdates(session) {
  try {
    // Re-fetch session data
    const sessionRes = await fetch(
      `${SB_URL}/rest/v1/tracking_sessions?id=eq.${session.id}&select=*&limit=1`,
      { headers: sbHeaders }
    );
    const sessions = await sessionRes.json();
    if (!Array.isArray(sessions) || !sessions.length) return;

    const updatedSession = sessions[0];
    sessionData = updatedSession;

    // Check if session ended
    if (!updatedSession.is_active) {
      clearInterval(pollInterval);
    }

    // Fetch new tracking points
    let newPointsQuery = `${SB_URL}/rest/v1/tracking_points?session_id=eq.${session.id}&order=recorded_at.asc`;
    if (lastPointId) {
      newPointsQuery += `&id=gt.${lastPointId}`;
    }
    newPointsQuery += `&limit=500`;

    const pointsRes = await fetch(newPointsQuery, { headers: sbHeaders });
    const newPoints = await pointsRes.json();
    const pts = Array.isArray(newPoints) ? newPoints : [];

    // Update map with new points
    if (pts.length && trailPolyline && positionMarker && map) {
      const path = trailPolyline.getPath();
      pts.forEach(p => {
        if (p.lat && p.lng) {
          path.push(new google.maps.LatLng(p.lat, p.lng));
        }
      });

      const lastPt = pts.filter(p => p.lat && p.lng).pop();
      if (lastPt) {
        const pos = { lat: lastPt.lat, lng: lastPt.lng };
        positionMarker.setPosition(pos);
        if (positionCircle) positionCircle.setCenter(pos);

        // Update heading arrow
        if (pts.length > 1) {
          const prev = pts[pts.length - 2];
          if (prev?.lat && prev?.lng) {
            const heading = computeHeading(prev, lastPt);
            const icon = positionMarker.getIcon();
            icon.rotation = heading;
            positionMarker.setIcon(icon);
          }
        }

        // Smooth pan to new position
        map.panTo(pos);
      }

      lastPointId = pts[pts.length - 1].id;
    }

    // Sound notification when rider starts moving
    if (updatedSession.is_active && !wasActive) {
      playNotificationPing();
    }
    wasActive = updatedSession.is_active;

    // Update KPIs
    updateKPIs(updatedSession, pts.length ? pts[pts.length - 1] : null);

    // Inactivity alert
    const speed = updatedSession.speed_kmh || updatedSession.current_speed_kmh || 0;
    if (speed > 1) lastMovingTs = Date.now();
    const stoppedMin = Math.round((Date.now() - lastMovingTs) / 60000);

    const inactEl = document.getElementById('inactivity-alert');
    if (inactEl) {
      if (stoppedMin >= 15) {
        inactEl.innerHTML = `<div style="background:rgba(255,51,51,0.12);border:1px solid rgba(255,51,51,0.3);border-radius:8px;padding:10px;text-align:center;margin-bottom:12px">
          <span style="font-size:14px;font-weight:800;color:#ff716c">&#9888; Sem movimento ha ${stoppedMin} min</span>
        </div>`;
      } else if (stoppedMin >= 5) {
        inactEl.innerHTML = `<div style="background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.3);border-radius:8px;padding:10px;text-align:center;margin-bottom:12px">
          <span style="font-size:14px;font-weight:800;color:#fbbf24">&#9208; Parado ha ${stoppedMin} min</span>
        </div>`;
      } else {
        inactEl.innerHTML = '';
      }
    }

    // Pulse effect on position circle (Feature 5)
    if (positionCircle && !window._pulseInterval) {
      let pulseRadius = 20;
      let growing = true;
      window._pulseInterval = setInterval(() => {
        if (!positionCircle) return;
        pulseRadius += growing ? 2 : -2;
        if (pulseRadius >= 40) growing = false;
        if (pulseRadius <= 20) growing = true;
        positionCircle.setRadius(pulseRadius);
        positionCircle.setOptions({ fillOpacity: 0.3 - (pulseRadius - 20) * 0.01 });
      }, 100);
    }

    // Re-run home distance + proximity on every poll (Feature 7)
    const lastPtForHome = pts.filter(p => p.lat && p.lng).pop();
    if (lastPtForHome) {
      calculateHomeDistance(lastPtForHome.lat, lastPtForHome.lng);
    } else if (updatedSession.lat && updatedSession.lng) {
      calculateHomeDistance(updatedSession.lat, updatedSession.lng);
    }

    // Refresh group member positions
    if (groupParticipants.length > 0) {
      showGroupMembers();
    }

    // Refresh weather every 5 minutes
    const lastPt = pts.filter(p => p.lat && p.lng).pop();
    if (lastPt && (Date.now() - weatherLastFetch) > 300000) {
      fetchRiderWeather(lastPt.lat, lastPt.lng);
    }

    // Update timestamp
    const timeEl = document.getElementById('last-update-time');
    if (timeEl) timeEl.textContent = formatTime(new Date());

    // If session ended, re-render to show ended state
    if (!updatedSession.is_active) {
      // Fetch all points for final render
      const allRes = await fetch(
        `${SB_URL}/rest/v1/tracking_points?session_id=eq.${session.id}&order=recorded_at.asc&limit=10000`,
        { headers: sbHeaders }
      );
      const allPoints = await allRes.json();
      renderPage(updatedSession, Array.isArray(allPoints) ? allPoints : []);
    }

  } catch (err) {
    console.error('Poll error:', err);
  }
}

function updateKPIs(session, lastPoint) {
  const grid = document.getElementById('kpi-grid');
  if (!grid) return;

  const speed = lastPoint?.speed_kmh ?? session.current_speed_kmh ?? null;
  const avgSpeed = session.avg_speed_kmh ?? null;
  const distance = session.distance_km ?? lastPoint?.distance_km ?? null;
  const battery = lastPoint?.battery_pct ?? session.battery_pct ?? null;
  const range = session.range_km ?? null;
  const hr = lastPoint?.hr_bpm ?? session.hr_bpm ?? null;
  const power = lastPoint?.power_w ?? session.power_w ?? null;
  const cadence = lastPoint?.cadence_rpm ?? session.cadence_rpm ?? null;
  const gear = session.gear_display ?? (lastPoint?.gear ? lastPoint.gear : null);
  const elevation = lastPoint?.altitude_m ?? session.altitude_m ?? null;
  const eleGain = session.elevation_gain_m ?? null;
  const mode = lastPoint?.assist_mode ?? session.assist_mode ?? null;

  let html = '';
  html += kpiCell('Velocidade', formatNum(speed, 1), 'km/h', 'green');
  html += kpiCell('Vel. Media', formatNum(avgSpeed, 1), 'km/h', 'green');
  html += kpiCell('Distancia', formatNum(distance, 1), 'km', 'green');
  html += kpiCell('Bateria', battery != null ? battery + '' : '--', '%', batteryColor(battery));
  html += kpiCell('Autonomia', formatNum(range, 0), 'km', 'amber');
  html += kpiCell('FC', hr != null ? hr + '' : '--', 'bpm', 'red');
  html += kpiCell('Potencia', formatNum(power, 0), 'W', 'blue');
  html += kpiCell('Cadencia', formatNum(cadence, 0), 'rpm', 'blue');
  html += kpiCell('Gear', gear || '--', '', 'purple');
  html += kpiCell('Elevacao', formatNum(elevation, 0), 'm', 'green');
  html += kpiCell('Desnivel', eleGain != null ? '\u25B2' + Math.round(eleGain) : '--', 'm', 'green');
  html += kpiCellMode('Modo', mode);
  grid.innerHTML = html;

  // Update route progress if present
  const routeSection = document.getElementById('route-section');
  if (routeSection && session.route_total_km && distance != null) {
    const pct = Math.min(100, (distance / session.route_total_km) * 100);
    const fill = routeSection.querySelector('.progress-fill');
    if (fill) fill.style.width = pct.toFixed(1) + '%';
    const stats = routeSection.querySelector('.route-stats');
    if (stats) {
      const etaStr = session.route_eta_min != null ? formatEta(session.route_eta_min) : '--';
      stats.innerHTML = `<span>${distance.toFixed(1)}/${session.route_total_km.toFixed(1)} km</span><span style="font-weight:700;color:#3fff8b">${Math.round(pct)}%</span><span>ETA ${etaStr}</span>`;
    }
  }
}

// HOME DISTANCE — calculate drive time from rider's home to current position
// ═══════════════════════════════════════════════════════════
function calculateHomeDistance(riderLat, riderLng) {
  if (!window.google?.maps) return;
  if (!medicalProfile) return;

  const homeCity = medicalProfile.address_city;
  const homeCountry = medicalProfile.address_country;
  if (!homeCity) return;

  const container = document.getElementById('home-distance-section');
  if (!container) return;

  const homeAddress = homeCity + (homeCountry ? ', ' + homeCountry : '');
  const directionsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(homeAddress)}&destination=${riderLat},${riderLng}&travelmode=driving`;

  const service = new google.maps.DirectionsService();
  service.route({
    origin: homeAddress,
    destination: { lat: riderLat, lng: riderLng },
    travelMode: google.maps.TravelMode.DRIVING,
  }, (result, status) => {
    if (status !== google.maps.DirectionsStatus.OK || !result.routes[0]?.legs[0]) {
      // Fallback — show just the address
      container.innerHTML = `
        <div style="background:#1a1919;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #262626">
          <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fbbf24;margin-bottom:6px">&#127968; Casa do Rider</div>
          <div style="font-size:13px;color:#adaaaa">${esc(homeAddress)}</div>
        </div>`;
      return;
    }

    const leg = result.routes[0].legs[0];
    const duration = leg.duration?.text || '--';
    const distance = leg.distance?.text || '--';

    // Feature 2: ETA — estimated arrival time at home
    const durationSec = leg.duration?.value || 0;
    const arrivalTime = new Date(Date.now() + durationSec * 1000);
    const arrivalStr = arrivalTime.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

    container.innerHTML = `
      <div style="background:var(--bg-card);border-radius:10px;padding:14px;margin-bottom:12px;border:1px solid var(--border)">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#fbbf24;margin-bottom:10px">&#128663; Tempo ate ao Rider (de carro)</div>
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
          <div style="text-align:center;flex:1">
            <div style="font-size:28px;font-weight:900;color:#fbbf24;font-family:monospace">${esc(duration)}</div>
            <div style="font-size:9px;color:var(--text-muted);margin-top:2px">TEMPO</div>
          </div>
          <div style="width:1px;height:40px;background:#333"></div>
          <div style="text-align:center;flex:1">
            <div style="font-size:28px;font-weight:900;color:#adaaaa;font-family:monospace">${esc(distance)}</div>
            <div style="font-size:9px;color:var(--text-muted);margin-top:2px">DISTANCIA</div>
          </div>
        </div>
        <div style="font-size:12px;color:#fbbf24;font-weight:600;margin-bottom:8px;text-align:center">Chegada estimada a casa: ~${arrivalStr}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">Desde: ${esc(homeAddress)}</div>
        <a href="${directionsUrl}" target="_blank" style="display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:var(--border);border:1px solid #fbbf2444;border-radius:6px;color:#fbbf24;font-size:12px;font-weight:700;text-decoration:none">
          &#128204; Navegar ate ao Rider
        </a>
      </div>`;

    // Feature 7: Home proximity countdown
    const distM = leg.distance?.value || 0;
    const proxEl = document.getElementById('home-proximity');
    if (proxEl) {
      if (distM < 500) {
        proxEl.innerHTML = '<div style="background:rgba(63,255,139,0.15);border:1px solid rgba(63,255,139,0.3);border-radius:8px;padding:12px;text-align:center;margin-bottom:8px"><span style="font-size:16px;font-weight:900;color:#3fff8b">&#127968; Chegou a casa!</span></div>';
      } else if (distM < 2000) {
        proxEl.innerHTML = '<div style="background:rgba(63,255,139,0.1);border:1px solid rgba(63,255,139,0.2);border-radius:8px;padding:10px;text-align:center;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:#3fff8b">&#127968; A ' + (distM/1000).toFixed(1) + ' km de casa</span></div>';
      } else if (distM < 5000) {
        proxEl.innerHTML = '<div style="background:rgba(251,191,36,0.1);border:1px solid rgba(251,191,36,0.2);border-radius:8px;padding:10px;text-align:center;margin-bottom:8px"><span style="font-size:13px;font-weight:700;color:#fbbf24">&#127968; A ' + (distM/1000).toFixed(1) + ' km de casa</span></div>';
      } else {
        proxEl.innerHTML = '';
      }
    }
  });
}

function fetchNearbyPlaces(lat, lng) {
  if (!window.google?.maps?.places) return;

  const container = document.getElementById('nearby-places');
  if (!container) return;

  const service = new google.maps.places.PlacesService(map);
  const location = new google.maps.LatLng(lat, lng);

  let allResults = [];
  let completed = 0;

  const types = ['hospital', 'police', 'fire_station'];
  types.forEach(type => {
    service.nearbySearch({
      location: location,
      rankBy: google.maps.places.RankBy.DISTANCE,
      type: type,
    }, (results, status) => {
      completed++;
      if (status === google.maps.places.PlacesServiceStatus.OK && results) {
        results.slice(0, 2).forEach(r => {
          const dist = google.maps.geometry.spherical.computeDistanceBetween(
            location,
            r.geometry.location
          );
          allResults.push({
            name: r.name,
            type: type,
            distance: dist,
            placeId: r.place_id,
            lat: r.geometry.location.lat(),
            lng: r.geometry.location.lng(),
            vicinity: r.vicinity || '',
            icon: type === 'hospital' ? '\uD83C\uDFE5' : type === 'police' ? '\uD83D\uDE93' : '\uD83D\uDE92',
            typeLabel: type === 'hospital' ? 'Hospital' : type === 'police' ? 'Policia' : 'Bombeiros',
            color: type === 'hospital' ? '#ff716c' : type === 'police' ? '#6e9bff' : '#ff9f43',
          });
        });
      }

      if (completed === types.length) {
        allResults.sort((a, b) => a.distance - b.distance);
        let html = '';
        allResults.forEach(r => {
          const distStr = r.distance < 1000
            ? Math.round(r.distance) + 'm'
            : (r.distance / 1000).toFixed(1) + 'km';
          const directionsUrl = `https://www.google.com/maps/dir/?api=1&origin=${lat},${lng}&destination=${r.lat},${r.lng}&travelmode=driving`;

          html += `<div style="background:#1a1919;border-radius:8px;padding:10px 12px;margin-bottom:6px;border-left:3px solid ${r.color}">`;
          html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">`;
          html += `<div style="flex:1;min-width:0">`;
          html += `<div style="font-size:12px;font-weight:700;color:#fff">${r.icon} ${esc(r.name)}</div>`;
          html += `<div style="font-size:10px;color:#888;margin-top:2px">${esc(r.typeLabel)} · ${distStr}${r.vicinity ? ' · ' + esc(r.vicinity) : ''}</div>`;
          html += `</div>`;
          html += `</div>`;
          // Action buttons
          html += `<div style="display:flex;gap:6px">`;
          // Get phone via PlaceDetails
          html += `<button onclick="callPlace('${r.placeId}', this)" style="flex:1;padding:8px;background:#262626;border:1px solid ${r.color}44;border-radius:6px;color:${r.color};font-size:11px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">&#128222; Ligar</button>`;
          html += `<a href="${directionsUrl}" target="_blank" style="flex:1;padding:8px;background:#262626;border:1px solid #3fff8b44;border-radius:6px;color:#3fff8b;font-size:11px;font-weight:700;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:4px">&#128204; Direcoes</a>`;
          html += `</div>`;
          html += `</div>`;
        });
        container.innerHTML = html;
      }
    });
  });
}

// Fetch phone number and initiate call
function callPlace(placeId, btn) {
  if (!map || !window.google?.maps?.places) return;
  const service = new google.maps.places.PlacesService(map);
  service.getDetails({ placeId: placeId, fields: ['formatted_phone_number'] }, (place, status) => {
    if (status === google.maps.places.PlacesServiceStatus.OK && place?.formatted_phone_number) {
      window.location.href = 'tel:' + place.formatted_phone_number;
    } else {
      btn.textContent = 'Sem telefone';
      btn.style.color = '#666';
    }
  });
}

  } else {
    html += `<div style="width:72px;height:72px;border-radius:50%;background:#262626;border:3px solid #494847;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:28px;color:#555">&#9786;</div>`;

    vitals.push(age + ' anos');
  }
  if (profile.gender) vitals.push(esc(profile.gender));
  if (profile.weight_kg) vitals.push(profile.weight_kg + ' kg');
  if (profile.height_cm) vitals.push(profile.height_cm + ' cm');
  if (vitals.length) html += `<div style="font-size:11px;color:#888;margin-bottom:6px">${vitals.join(' · ')}</div>`;
  // Blood type badge inline
  if (profile.blood_type) {
    html += `<span class="blood-badge">${esc(profile.blood_type)}</span> `;
  }
  if (profile.organ_donor) {
    html += `<span class="donor-badge">&#9829; Dador</span>`;
  }
  html += `</div>`;
  html += `</div>`;

  // Allergies
  if (profile.allergies && profile.allergies.length) {
    html += `<div class="medical-item">`;
    html += `<span class="medical-label">Alergias</span>`;
    html += `<div>`;
    profile.allergies.forEach(a => { html += `<span class="alert-tag tag-red">${esc(a)}</span> `; });
    html += `</div></div>`;
  }

  // Medications
  if (profile.medications && profile.medications.length) {
    html += `<div class="medical-item">`;
    html += `<span class="medical-label">Medicacao</span>`;
    html += `<div>`;
    profile.medications.forEach(m => { html += `<span class="alert-tag tag-amber">${esc(m)}</span> `; });
    html += `</div></div>`;
  }

  // Medical conditions
  if (profile.medical_conditions && profile.medical_conditions.length) {
    html += `<div class="medical-item">`;
    html += `<span class="medical-label">Condicoes</span>`;
    html += `<div>`;
    profile.medical_conditions.forEach(c => { html += `<span class="alert-tag tag-blue">${esc(c)}</span> `; });
    html += `</div></div>`;
  }

  // Health insurance
  if (profile.health_insurance) {
    html += `<div class="medical-item">`;
    html += `<span class="medical-label">Seguro Saude</span>`;
    html += `<span class="medical-value">${esc(profile.health_insurance)}</span>`;
    html += `</div>`;
  }

  // Medical notes
  if (profile.medical_notes) {
    html += `<div class="medical-item">`;
    html += `<span class="medical-label">Notas Medicas</span>`;
    html += `<span class="medical-value">${esc(profile.medical_notes)}</span>`;
    html += `</div>`;
  }

  // ICE Emergency contacts
  const contacts = profile.emergency_contacts || [];
  if (contacts.length) {
    html += `<div class="medical-item" style="grid-column: 1 / -1">`;
    html += `<span class="medical-label">Contactos ICE</span>`;
    contacts.forEach(c => {
      html += `<a href="tel:${esc(c.phone)}" class="ice-contact">`;
      html += `${esc(c.name)}${c.relation ? ' (' + esc(c.relation) + ')' : ''} &#128222; ${esc(c.phone)}`;
      html += `</a>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // medical-grid
  html += `</div>`; // medical-section
  return html;
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function formatNum(val, decimals) {
  if (val == null || val === '') return '--';
  return Number(val).toFixed(decimals);
}

function formatTime(date) {
  return date.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function formatEta(minutes) {
  if (minutes == null) return '--';
  const h = Math.floor(minutes / 60);
  const m = Math.round(minutes % 60);
  return h > 0 ? `${h}:${String(m).padStart(2, '0')}` : `${m}min`;
}

function batteryColor(pct) {
  if (pct == null) return 'amber';
  if (pct <= 15) return 'red';
  if (pct <= 30) return 'amber';
  return 'green';
}

function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

function showError(title, msg) {
  document.getElementById('app').innerHTML = `

// ═══════════════════════════════════════════════════════════
// ETA TO HOME (bicycling mode — rider→home)
// ═══════════════════════════════════════════════════════════
function calculateETAToHome(riderLat, riderLng) {
  if (!window.google?.maps || !medicalProfile?.address_city) return;
  const container = document.getElementById('eta-home-section');
  if (!container) return;

  const homeAddress = medicalProfile.address_city + (medicalProfile.address_country ? ', ' + medicalProfile.address_country : '');

  const service = new google.maps.DirectionsService();
  service.route({
    origin: { lat: riderLat, lng: riderLng },
    destination: homeAddress,
    travelMode: google.maps.TravelMode.BICYCLING,
  }, (result, status) => {
    if (status !== 'OK' || !result.routes[0]?.legs[0]) return;
    const leg = result.routes[0].legs[0];
    container.innerHTML = `
      <div style="background:#1a1919;border-radius:10px;padding:12px;margin-bottom:12px;border:1px solid #262626;border-left:3px solid #3fff8b">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#3fff8b;margin-bottom:8px">&#127968; ETA a Casa (bicicleta)</div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:center;flex:1">
            <div style="font-size:24px;font-weight:900;color:#3fff8b;font-family:monospace">${leg.duration?.text || '--'}</div>
            <div style="font-size:8px;color:#888">TEMPO</div>
          </div>
          <div style="width:1px;height:30px;background:#333"></div>
          <div style="text-align:center;flex:1">
            <div style="font-size:24px;font-weight:900;color:#adaaaa;font-family:monospace">${leg.distance?.text || '--'}</div>
            <div style="font-size:8px;color:#888">DISTANCIA</div>
          </div>
        </div>
      </div>`;
  });
}

// ═══════════════════════════════════════════════════════════
// SPARKLINES (Speed + HR history)
// ═══════════════════════════════════════════════════════════
function renderSparklines(points) {
  if (!points || points.length < 3) return '';

  const w = 460, h = 50;
  const speeds = points.map(p => p.speed_kmh || 0);
  const hrs = points.map(p => p.heart_rate || p.hr_bpm || 0);
  const maxSpd = Math.max(...speeds, 1);
  const maxHr = Math.max(...hrs, 1);

  let spdPath = '', hrPath = '';
  points.forEach((p, i) => {
    const x = (i / (points.length - 1)) * w;
    const ySpd = h - (speeds[i] / maxSpd) * h;
    const yHr = h - (hrs[i] / maxHr) * h;
    spdPath += (i === 0 ? 'M' : 'L') + ` ${x.toFixed(1)} ${ySpd.toFixed(1)}`;
    if (hrs[i] > 0) hrPath += (i === 0 || (i > 0 && hrs[i-1] === 0) ? 'M' : 'L') + ` ${x.toFixed(1)} ${yHr.toFixed(1)}`;
  });

  let html = `<div class="route-section">`;
  html += `<div class="route-title">&#128200; Historico da Sessao</div>`;
  html += `<div style="position:relative;background:#111;border-radius:6px;padding:6px">`;
  html += `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">`;
  html += `<path d="${spdPath}" stroke="#3fff8b" stroke-width="1.5" fill="none" opacity="0.8"/>`;
  if (hrPath) html += `<path d="${hrPath}" stroke="#ff716c" stroke-width="1.5" fill="none" opacity="0.6"/>`;
  html += `</svg>`;
  html += `<div style="position:absolute;top:3px;right:8px;display:flex;gap:8px;font-size:8px">`;
  html += `<span style="color:#3fff8b">&#9679; Vel. (max ${Math.round(maxSpd)})</span>`;
  if (maxHr > 0) html += `<span style="color:#ff716c">&#9679; FC (max ${Math.round(maxHr)})</span>`;
  html += `</div></div></div>`;
  return html;
}

// ═══════════════════════════════════════════════════════════
// WEATHER (Open-Meteo, free, no API key)
// ═══════════════════════════════════════════════════════════
async function fetchRiderWeather(lat, lng) {
  const container = document.getElementById('weather-section');
  if (!container) return;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat.toFixed(4)}&longitude=${lng.toFixed(4)}&current=temperature_2m,windspeed_10m,precipitation,weathercode`;
    const res = await fetch(url);
    const data = await res.json();
    const cur = data.current;
    if (!cur) return;

    const temp = cur.temperature_2m;
    const wind = cur.windspeed_10m;
    const precip = cur.precipitation;
    const code = cur.weathercode;

    const weatherEmoji = code <= 3 ? '&#9728;&#65039;' : code <= 48 ? '&#127787;&#65039;' : code <= 67 ? '&#127783;&#65039;' : code <= 77 ? '&#10052;&#65039;' : '&#9928;&#65039;';
    const weatherText = code <= 3 ? 'Limpo' : code <= 48 ? 'Nublado' : code <= 67 ? 'Chuva' : code <= 77 ? 'Neve' : 'Trovoada';

    container.innerHTML = `
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <div style="flex:1;background:#1a1919;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #262626">
          <div style="font-size:20px">${weatherEmoji}</div>
          <div style="font-size:10px;color:#888">${weatherText}</div>
        </div>
        <div style="flex:1;background:#1a1919;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #262626">
          <div style="font-size:18px;font-weight:900;color:#fbbf24">${temp}&deg;</div>
          <div style="font-size:10px;color:#888">Temp</div>
        </div>
        <div style="flex:1;background:#1a1919;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #262626">
          <div style="font-size:18px;font-weight:900;color:#6e9bff">${wind}<span style="font-size:10px">km/h</span></div>
          <div style="font-size:10px;color:#888">Vento</div>
        </div>
        ${precip > 0 ? `<div style="flex:1;background:#1a1919;border-radius:8px;padding:8px 10px;text-align:center;border:1px solid #262626">
          <div style="font-size:18px;font-weight:900;color:#ff716c">${precip}<span style="font-size:10px">mm</span></div>
          <div style="font-size:10px;color:#888">Precip</div>
        </div>` : ''}
      </div>`;
    weatherLastFetch = Date.now();
  } catch(e) { console.warn('Weather fetch failed:', e); }
}

// ═══════════════════════════════════════════════════════════
// SOUND NOTIFICATION (rider starts moving)
// ═══════════════════════════════════════════════════════════
function playNotificationPing() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    osc.type = 'sine';
    gain.gain.value = 0.3;
    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
    osc.start();
    osc.stop(ctx.currentTime + 0.5);
  } catch(e) {}
}
