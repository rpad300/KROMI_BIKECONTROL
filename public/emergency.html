<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0e0e0e">
<title>KROMI Emergency Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0e0e0e; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }

  /* Header with pulse */
  .emergency-header { background: linear-gradient(135deg, #ff3333 0%, #cc0000 100%); padding: 20px 16px; text-align: center; position: relative; overflow: hidden; }
  .emergency-header::after { content: ''; position: absolute; inset: 0; background: rgba(255,255,255,0.08); animation: pulse-bg 2s ease-in-out infinite; }
  @keyframes pulse-bg { 0%,100% { opacity: 0; } 50% { opacity: 1; } }
  .emergency-header h1 { font-size: 20px; font-weight: 900; letter-spacing: 2px; position: relative; z-index: 1; }
  .emergency-header .subtitle { font-size: 11px; opacity: 0.8; margin-top: 4px; position: relative; z-index: 1; }
  .live-badge { display: inline-block; padding: 3px 10px; background: rgba(0,0,0,0.3); border-radius: 12px; font-size: 10px; font-weight: 700; margin-top: 6px; position: relative; z-index: 1; }
  .live-dot { display: inline-block; width: 6px; height: 6px; background: #3fff8b; border-radius: 50%; margin-right: 4px; animation: blink 1s infinite; }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .container { padding: 12px; max-width: 520px; margin: 0 auto; }
  .card { background: #1a1919; border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #262626; }
  .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .card-title .icon { font-size: 14px; }

  .field { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1f1f1f; }
  .field:last-child { border-bottom: none; }
  .field-label { color: #888; font-size: 13px; }
  .field-value { font-size: 14px; font-weight: 600; }

  .blood-type { font-size: 48px; font-weight: 900; color: #ff3333; text-align: center; line-height: 1.1; }
  .blood-type-label { font-size: 11px; color: #888; text-align: center; }

  .call-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 8px; text-decoration: none; color: inherit; }
  .call-emergency { background: #ff3333; color: #fff; font-size: 18px; }
  .call-primary { background: #3fff8b; color: #000; }
  .call-secondary { background: #262626; color: #fff; border: 1px solid #333; }

  .alert-tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; margin: 2px; }
  .tag-red { background: rgba(255,51,51,0.2); color: #ff5555; border: 1px solid rgba(255,51,51,0.3); }
  .tag-amber { background: rgba(255,204,0,0.2); color: #ffcc00; border: 1px solid rgba(255,204,0,0.3); }
  .tag-blue { background: rgba(110,155,255,0.2); color: #6e9bff; border: 1px solid rgba(110,155,255,0.3); }

  .donor-badge { display: inline-block; padding: 4px 10px; background: rgba(63,255,139,0.15); color: #3fff8b; border: 1px solid rgba(63,255,139,0.3); border-radius: 4px; font-size: 11px; font-weight: 700; }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .stat { text-align: center; }
  .stat .val { font-size: 28px; font-weight: 900; font-family: 'SF Mono', 'Cascadia Code', monospace; line-height: 1.2; }
  .stat .lbl { font-size: 10px; color: #888; text-transform: uppercase; }

  /* Map */
  #map-container { width: 100%; height: 340px; border-radius: 8px; overflow: hidden; background: #111; position: relative; }
  .map-legend { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .map-legend span { font-size: 9px; display: flex; align-items: center; gap: 3px; color: #888; }
  .map-legend .dot { width: 8px; height: 8px; border-radius: 50%; }

  /* Live tracking button */
  .live-track-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; text-decoration: none; background: linear-gradient(135deg, #ff3333, #cc0000); color: #fff; }
  .live-track-btn .pulse-dot { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: blink 1s infinite; flex-shrink: 0; }

  /* Pulsing ring for live marker overlay */
  @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
  .map-pulse-overlay { position: absolute; pointer-events: none; z-index: 10; }

  /* Canvas charts */
  .chart-canvas { width: 100%; height: 180px; display: block; border-radius: 6px; }
  .chart-canvas-sm { width: 100%; height: 50px; display: block; }
  .zone-bar-canvas { width: 100%; height: 32px; display: block; border-radius: 4px; }

  /* Pre-accident alert */
  .pre-accident { border: 1px solid rgba(255,51,51,0.4); background: rgba(255,51,51,0.05); }

  /* HR zone colors */
  .z1 { background: #6b7280; } .z2 { background: #3b82f6; } .z3 { background: #22c55e; }
  .z4 { background: #f59e0b; } .z5 { background: #ef4444; }

  .loading { text-align: center; padding: 60px 20px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #ff3333; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .not-found { text-align: center; padding: 60px 20px; color: #888; }
  .footer { text-align: center; padding: 20px; font-size: 9px; color: #494847; }

  /* Context mini-chart labels */
  .context-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .context-label { width: 50px; font-size: 10px; color: #888; text-align: right; flex-shrink: 0; }
  .context-val { font-size: 12px; font-weight: 700; width: 45px; text-align: right; flex-shrink: 0; }
</style>
</head>
<body>
<script>
// Unregister any PWA service worker so this page is served directly
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  }).then(() => {
    if (document.querySelector('#root') || document.querySelector('[data-reactroot]')) {
      location.reload();
    }
  });
}
</script>
  <div class="emergency-header">
    <h1>PERFIL DE EMERGENCIA</h1>
    <div class="subtitle">KROMI BikeControl</div>
    <div id="live-indicator"></div>
  </div>

  <div id="content" class="container">
    <div class="loading">
      <div class="spinner"></div>
      <div>A carregar perfil de emergencia...</div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const SB_URL = 'https://ctsuupvmmyjlrtjnxagv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN0c3V1cHZtbXlqbHJ0am54YWd2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5Njg3MTgsImV4cCI6MjA5MDU0NDcxOH0.VgpKrjxYirb9Gc7OZX-aHGJmGJ3QdDM5I7iXaWDmBXQ';
const MAPS_KEY = 'AIzaSyBip-WjHT8ZEJ4sWtYPH0pfUwwj9VAsZFE';

const ZONE_COLORS = ['#6b7280','#3b82f6','#22c55e','#f59e0b','#ef4444'];
const ZONE_NAMES  = ['Z1 Recuperacao','Z2 Endurance','Z3 Tempo','Z4 Limiar','Z5 VO2max'];
const sbHeaders = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` };

// ═══════════════════════════════════════════════════════════
// MAIN LOAD
// ═══════════════════════════════════════════════════════════
async function load() {
  const token = window.location.pathname.split('/').pop() || new URLSearchParams(window.location.search).get('t');
  if (!token) { showNotFound(); return; }

  try {
    // 1. Fetch emergency profile
    const res = await fetch(`${SB_URL}/rest/v1/emergency_profiles?token=eq.${token}&active=eq.true&select=*&limit=1`, { headers: sbHeaders });
    const profiles = await res.json();
    if (!profiles.length) { showNotFound(); return; }
    const profile = profiles[0];

    // 2. Fetch tracking session — prefer active, then last 48h inactive
    let session = null;
    let isLive = false;

    // Try active tracking session first
    const activeRes = await fetch(`${SB_URL}/rest/v1/tracking_sessions?user_id=eq.${profile.user_id}&is_active=eq.true&select=*&order=started_at.desc&limit=1`, { headers: sbHeaders });
    const activeSessions = await activeRes.json();

    if (activeSessions.length) {
      session = activeSessions[0];
      isLive = true;
    } else {
      // Fall back to last 48h ended session
      const since = new Date(Date.now() - 48 * 60 * 60 * 1000).toISOString();
      const rideRes = await fetch(`${SB_URL}/rest/v1/tracking_sessions?user_id=eq.${profile.user_id}&started_at=gte.${since}&is_active=eq.false&select=*&order=ended_at.desc&limit=1`, { headers: sbHeaders });
      const rides = await rideRes.json();
      if (rides.length) session = rides[0];
    }

    // 3. Fetch tracking points for the session (breadcrumb trail)
    let snapshots = [];
    const fcMax = profile.fc_max || profile.hr_max || 190;
    if (session?.id) {
      const snapRes = await fetch(`${SB_URL}/rest/v1/tracking_points?session_id=eq.${session.id}&select=lat,lng,altitude,speed_kmh,heart_rate,recorded_at&order=recorded_at.asc&limit=5000`, { headers: sbHeaders });
      const rawPoints = await snapRes.json();
      if (Array.isArray(rawPoints) && rawPoints.length) {
        // Map tracking_points to the snapshot format used by render/charts
        const startTime = new Date(rawPoints[0].recorded_at).getTime();
        let cumDist = 0;
        let prevLat = rawPoints[0].lat;
        let prevLng = rawPoints[0].lng;
        let prevAlt = rawPoints[0].altitude;
        snapshots = rawPoints.map((p, i) => {
          // Approximate distance from GPS coords
          if (i > 0 && p.lat && p.lng) {
            const dLat = (p.lat - prevLat) * 111320;
            const dLng = (p.lng - prevLng) * 111320 * Math.cos(p.lat * Math.PI / 180);
            cumDist += Math.sqrt(dLat * dLat + dLng * dLng) / 1000;
          }
          // Approximate gradient from altitude change
          const altDiff = (p.altitude != null && prevAlt != null) ? p.altitude - prevAlt : 0;
          const segDist = i > 0 ? Math.sqrt(Math.pow((p.lat - prevLat) * 111320, 2) + Math.pow((p.lng - prevLng) * 111320 * Math.cos(p.lat * Math.PI / 180), 2)) : 0;
          const gradient = segDist > 5 ? (altDiff / segDist) * 100 : 0;
          // Compute HR zone (0=none, 1-5) from fcMax
          const hrPct = p.heart_rate ? p.heart_rate / fcMax : 0;
          const hrZone = !p.heart_rate ? 0 : hrPct >= 0.9 ? 5 : hrPct >= 0.8 ? 4 : hrPct >= 0.7 ? 3 : hrPct >= 0.6 ? 2 : 1;

          const snap = {
            elapsed_s: Math.round((new Date(p.recorded_at).getTime() - startTime) / 1000),
            lat: p.lat,
            lng: p.lng,
            altitude_m: p.altitude,
            hr_bpm: p.heart_rate || 0,
            hr_zone: hrZone,
            speed_kmh: p.speed_kmh || 0,
            power_watts: 0,
            distance_km: Math.round(cumDist * 1000) / 1000,
            gradient_pct: Math.round(gradient * 10) / 10,
            spo2_pct: null,
            cadence_rpm: 0,
            battery_pct: null,
            assist_mode: 0,
            torque_nm: 0,
            created_at: p.recorded_at,
          };
          prevLat = p.lat;
          prevLng = p.lng;
          if (p.altitude != null) prevAlt = p.altitude;
          return snap;
        });
      }
    }

    // 4. Fetch nearby riders for community rescue
    let nearbyRiders = [];
    const victimLat = session?.lat || profile.last_location_lat;
    const victimLng = session?.lng || profile.last_location_lng;
    if (victimLat && victimLng) {
      try {
        const nearbyRes = await fetch(`${SB_URL}/rest/v1/rpc/nearby_riders`, {
          method: 'POST',
          headers: { ...sbHeaders, 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_lat: victimLat, p_lng: victimLng, p_radius_km: 5, p_exclude_user: profile.user_id }),
        });
        nearbyRiders = await nearbyRes.json();
        if (!Array.isArray(nearbyRiders)) nearbyRiders = [];
      } catch {}
    }

    // Show live badge
    if (isLive) {
      document.getElementById('live-indicator').innerHTML = '<div class="live-badge"><span class="live-dot"></span>SESSAO ACTIVA — TRACKING LIVE</div>';
    }

    render(profile, session, isLive, snapshots, nearbyRiders);

    // 5. Init map and charts after DOM is ready
    if (snapshots.length > 0) {
      await loadGoogleMaps();
      initMap(snapshots, session, isLive);
    }
    if (snapshots.length > 0) {
      requestAnimationFrame(() => {
        drawHRTimeline('hr-timeline', snapshots, fcMax);
        drawHRZones('hr-zones', snapshots);
        drawElevation('elevation-chart', snapshots);
        drawPreAccident('pre-accident-hr', 'pre-accident-speed', 'pre-accident-power', snapshots);
      });
    }

    // 6. Live refresh if active session
    if (isLive) {
      window._emergencyLiveInterval = setInterval(async () => {
        const still = await refreshLiveData(profile.user_id, session.id);
        if (still === false) clearInterval(window._emergencyLiveInterval);
      }, 10000);
    }

  } catch (err) {
    console.error('Emergency load error:', err);
    showNotFound();
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(p, session, isLive, snaps, nearbyRiders) {
  const age = p.birthdate ? Math.floor((Date.now() - new Date(p.birthdate).getTime()) / (365.25*24*60*60*1000)) : null;
  const contacts = p.emergency_contacts || [];
  let html = '';

  // ── Emergency call buttons ──
  html += `<a href="tel:112" class="call-btn call-emergency">112 — EMERGENCIA</a>`;
  contacts.forEach(c => {
    html += `<a href="tel:${c.phone}" class="call-btn call-primary">${esc(c.name)} (${esc(c.relation)}) — ${esc(c.phone)}</a>`;
  });
  if (p.phone) html += `<a href="tel:${p.phone}" class="call-btn call-secondary">Vitima: ${esc(p.phone)}</a>`;

  // ── Identification ──
  html += `<div class="card">`;
  html += `<div class="card-title" style="color:#ff3333"><span class="icon">&#9888;</span> Identificacao</div>`;
  if (p.avatar_url) html += `<div style="text-align:center;margin-bottom:12px"><img src="${esc(p.avatar_url)}" style="width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid #ff3333" alt="avatar" /></div>`;
  html += field('Nome', p.name);
  if (age) html += field('Idade', age + ' anos');
  if (p.gender) html += field('Genero', p.gender);
  if (p.weight_kg) html += field('Peso', p.weight_kg + ' kg');
  if (p.height_cm) html += field('Altura', p.height_cm + ' cm');
  if (p.address_city) html += field('Localidade', p.address_city + (p.address_country ? ', ' + p.address_country : ''));
  html += `</div>`;

  // ── Medical info ──
  html += `<div class="card">`;
  html += `<div class="card-title" style="color:#ff3333"><span class="icon">&#9829;</span> Informacao Medica</div>`;
  if (p.blood_type) html += `<div style="padding:12px 0;text-align:center"><div class="blood-type">${esc(p.blood_type)}</div><div class="blood-type-label">Tipo Sanguineo</div></div>`;
  if (p.organ_donor) html += `<div style="text-align:center;margin-bottom:8px"><span class="donor-badge">&#9829; Dador de Orgaos</span></div>`;
  if (p.health_insurance) html += field('Seguro Saude', p.health_insurance);
  html += `</div>`;

  // ── Allergies / Medications / Conditions ──
  if ((p.allergies?.length) || (p.medications?.length) || (p.medical_conditions?.length) || p.medical_notes) {
    html += `<div class="card">`;
    html += `<div class="card-title" style="color:#fbbf24"><span class="icon">&#9888;</span> Alertas Medicos</div>`;
    if (p.allergies?.length) {
      html += `<div style="margin-bottom:8px"><div class="field-label" style="margin-bottom:4px;color:#888;font-size:12px">Alergias</div>`;
      p.allergies.forEach(a => { html += `<span class="alert-tag tag-red">${esc(a)}</span>`; });
      html += `</div>`;
    }
    if (p.medications?.length) {
      html += `<div style="margin-bottom:8px"><div class="field-label" style="margin-bottom:4px;color:#888;font-size:12px">Medicacao</div>`;
      p.medications.forEach(m => { html += `<span class="alert-tag tag-amber">${esc(m)}</span>`; });
      html += `</div>`;
    }
    if (p.medical_conditions?.length) {
      html += `<div style="margin-bottom:8px"><div class="field-label" style="margin-bottom:4px;color:#888;font-size:12px">Condicoes</div>`;
      p.medical_conditions.forEach(c => { html += `<span class="alert-tag tag-blue">${esc(c)}</span>`; });
      html += `</div>`;
    }
    if (p.medical_notes) {
      html += `<div class="field-label" style="margin-bottom:4px;color:#888;font-size:12px">Notas</div><div style="font-size:13px;color:#adaaaa">${esc(p.medical_notes)}</div>`;
    }
    html += `</div>`;
  }

  // ── PRE-ACCIDENT CONTEXT (last 10 min) — critical for paramedics ──
  if (snaps.length > 10) {
    const lastSnap = snaps[snaps.length - 1];
    const cutoff = lastSnap.elapsed_s - 600; // last 10 minutes
    const recent = snaps.filter(s => s.elapsed_s >= cutoff);

    if (recent.length > 3) {
      const recentHRs = recent.filter(s => s.hr_bpm > 0).map(s => s.hr_bpm);
      const recentSpeeds = recent.map(s => s.speed_kmh || 0);
      const recentPower = recent.map(s => s.power_watts || 0);
      const avgRecentHR = recentHRs.length ? Math.round(recentHRs.reduce((a,b) => a+b, 0) / recentHRs.length) : 0;
      const maxRecentHR = recentHRs.length ? Math.max(...recentHRs) : 0;
      const lastHR = recentHRs.length ? recentHRs[recentHRs.length - 1] : 0;
      const lastSpeed = recentSpeeds[recentSpeeds.length - 1] || 0;
      const lastPower = recentPower[recentPower.length - 1] || 0;

      // Detect clinical alerts
      let alerts = [];
      if (maxRecentHR > 170) alerts.push('HR elevada (>' + maxRecentHR + ' bpm)');
      if (recentHRs.length > 5) {
        const firstHalf = recentHRs.slice(0, Math.floor(recentHRs.length / 2));
        const secondHalf = recentHRs.slice(Math.floor(recentHRs.length / 2));
        const avgFirst = firstHalf.reduce((a,b) => a+b, 0) / firstHalf.length;
        const avgSecond = secondHalf.reduce((a,b) => a+b, 0) / secondHalf.length;
        if (avgFirst - avgSecond > 40) alerts.push('Queda abrupta de HR (-' + Math.round(avgFirst - avgSecond) + ' bpm)');
        if (avgSecond - avgFirst > 30) alerts.push('Subida rapida de HR (+' + Math.round(avgSecond - avgFirst) + ' bpm)');
      }
      if (lastSpeed > 30) alerts.push('Velocidade alta no momento (' + lastSpeed.toFixed(0) + ' km/h)');

      html += `<div class="card pre-accident">`;
      html += `<div class="card-title" style="color:#ff3333"><span class="icon">&#9200;</span> Ultimos 10 Minutos (Contexto Pre-Acidente)</div>`;

      if (alerts.length) {
        html += `<div style="margin-bottom:12px">`;
        alerts.forEach(a => { html += `<span class="alert-tag tag-red">${a}</span> `; });
        html += `</div>`;
      }

      html += `<div class="stats-grid" style="margin-bottom:12px">`;
      html += `<div class="stat"><div class="val" style="color:${lastHR > 160 ? '#ef4444' : '#3fff8b'}">${lastHR || '—'}</div><div class="lbl">HR Ultimo</div></div>`;
      html += `<div class="stat"><div class="val" style="color:#fbbf24">${lastSpeed.toFixed(0)}</div><div class="lbl">km/h</div></div>`;
      html += `<div class="stat"><div class="val" style="color:#6e9bff">${lastPower}</div><div class="lbl">Watts</div></div>`;
      html += `</div>`;

      // Mini charts for last 10 min
      html += `<div class="context-row"><span class="context-label">HR</span><canvas id="pre-accident-hr" class="chart-canvas-sm" style="flex:1"></canvas><span class="context-val" style="color:#ef4444">${avgRecentHR}</span></div>`;
      html += `<div class="context-row"><span class="context-label">Vel.</span><canvas id="pre-accident-speed" class="chart-canvas-sm" style="flex:1"></canvas><span class="context-val" style="color:#fbbf24">${(recentSpeeds.reduce((a,b)=>a+b,0)/recentSpeeds.length).toFixed(0)}</span></div>`;
      html += `<div class="context-row"><span class="context-label">Potencia</span><canvas id="pre-accident-power" class="chart-canvas-sm" style="flex:1"></canvas><span class="context-val" style="color:#6e9bff">${(recentPower.reduce((a,b)=>a+b,0)/recentPower.length).toFixed(0)}</span></div>`;

      // SpO2 if available
      const spo2Snaps = recent.filter(s => s.spo2_pct && s.spo2_pct > 0);
      if (spo2Snaps.length) {
        const lastSpo2 = spo2Snaps[spo2Snaps.length - 1].spo2_pct;
        html += `<div style="margin-top:8px;text-align:center"><span style="font-size:11px;color:#888">SpO2</span> <span style="font-size:22px;font-weight:900;color:${lastSpo2 < 94 ? '#ef4444' : '#3fff8b'}">${lastSpo2}%</span></div>`;
      }

      html += `</div>`;
    }
  }

  // ── MAP — route with HR zone coloring ──
  if (snaps.some(s => s.lat && s.lng)) {
    html += `<div class="card">`;
    html += `<div class="card-title" style="color:#6e9bff"><span class="icon">&#127758;</span> Mapa do Percurso${isLive ? ' <span style="color:#ff3333;font-size:10px;font-weight:700;background:rgba(255,51,51,0.15);padding:2px 6px;border-radius:8px;border:1px solid rgba(255,51,51,0.3)">LIVE</span>' : ''}</div>`;
    html += `<div id="map-container"></div>`;
    if (isLive) {
      const token = window.location.pathname.split('/').pop() || new URLSearchParams(window.location.search).get('t');
      html += `<a href="/live.html?t=${esc(token || '')}" target="_blank" class="live-track-btn"><span class="pulse-dot"></span>Ver Tracking ao Vivo</a>`;
    }
    html += `<div class="map-legend" style="margin-top:${isLive ? '6px' : '8px'}">`;
    ZONE_NAMES.forEach((name, i) => { html += `<span><span class="dot" style="background:${ZONE_COLORS[i]}"></span>${name}</span>`; });
    html += `<span style="margin-left:auto"><span class="dot" style="background:#ef4444;border:1px solid #fff"></span>${isLive ? 'Posicao actual' : 'Ultima posicao'}</span>`;
    html += `<span><span class="dot" style="background:#3fff8b"></span>Inicio</span>`;
    html += `</div></div>`;
  }

  // ── HR CARDIAC PROFILE ──
  if (snaps.some(s => s.hr_bpm > 0)) {
    html += `<div class="card">`;
    html += `<div class="card-title" style="color:#ef4444"><span class="icon">&#9829;</span> Perfil Cardiaco</div>`;

    // Stats row
    const hrs = snaps.filter(s => s.hr_bpm > 0).map(s => s.hr_bpm);
    const avgHR = Math.round(hrs.reduce((a,b) => a+b, 0) / hrs.length);
    const maxHR = Math.max(...hrs);
    const minHR = Math.min(...hrs);
    const lastHR = hrs[hrs.length - 1];

    html += `<div class="stats-grid" style="margin-bottom:12px">`;
    html += `<div class="stat"><div class="val" style="color:#3fff8b">${avgHR}</div><div class="lbl">HR Media</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#ef4444">${maxHR}</div><div class="lbl">HR Max</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#fbbf24">${lastHR}</div><div class="lbl">HR Ultimo</div></div>`;
    html += `</div>`;

    // HR zone distribution bar
    html += `<div style="margin-bottom:4px;font-size:10px;color:#888">Distribuicao por zonas</div>`;
    html += `<canvas id="hr-zones" class="zone-bar-canvas"></canvas>`;

    // HR timeline chart
    html += `<div style="margin-top:12px;margin-bottom:4px;font-size:10px;color:#888">Frequencia cardiaca ao longo do tempo</div>`;
    html += `<canvas id="hr-timeline" class="chart-canvas"></canvas>`;

    html += `</div>`;
  }

  // ── ELEVATION PROFILE ──
  if (snaps.some(s => s.altitude_m != null)) {
    html += `<div class="card">`;
    html += `<div class="card-title" style="color:#22c55e"><span class="icon">&#9968;</span> Perfil de Elevacao</div>`;

    const alts = snaps.filter(s => s.altitude_m != null).map(s => s.altitude_m);
    const minAlt = Math.round(Math.min(...alts));
    const maxAlt = Math.round(Math.max(...alts));
    const gain = calcElevGain(snaps);

    html += `<div class="stats-grid" style="margin-bottom:8px">`;
    html += `<div class="stat"><div class="val" style="color:#22c55e;font-size:20px">${minAlt}m</div><div class="lbl">Min</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#22c55e;font-size:20px">${maxAlt}m</div><div class="lbl">Max</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#22c55e;font-size:20px">+${gain}m</div><div class="lbl">D+</div></div>`;
    html += `</div>`;

    html += `<canvas id="elevation-chart" class="chart-canvas"></canvas>`;
    html += `</div>`;
  }

  // ── RIDE SUMMARY (from tracking_sessions snapshot) ──
  if (session) {
    html += `<div class="card">`;
    html += `<div class="card-title" style="color:#6e9bff"><span class="icon">&#128690;</span> Resumo da Actividade</div>`;

    // Duration from started_at to ended_at (or now if live)
    const startMs = new Date(session.started_at).getTime();
    const endMs = session.ended_at ? new Date(session.ended_at).getTime() : Date.now();
    const dur = Math.round((endMs - startMs) / 1000);
    const h = Math.floor(dur / 3600);
    const m = Math.floor((dur % 3600) / 60);
    const timeStr = h > 0 ? `${h}h ${m}min` : `${m}min`;
    const when = new Date(session.started_at);
    const timeAgo = Math.round((Date.now() - when.getTime()) / 3600000);
    const timeLabel = isLive ? 'Em curso' : `Ha ${timeAgo}h`;

    html += `<div style="text-align:center;font-size:11px;color:#888;margin-bottom:12px">${timeLabel} — ${when.toLocaleString('pt-PT', {hour:'2-digit',minute:'2-digit',day:'2-digit',month:'short'})}</div>`;

    html += `<div class="stats-grid">`;
    html += `<div class="stat"><div class="val" style="color:#fff;font-size:22px">${(session.distance_km || 0).toFixed(1)}</div><div class="lbl">km</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#fff;font-size:22px">${session.avg_speed_kmh ? session.avg_speed_kmh.toFixed(1) : '—'}</div><div class="lbl">km/h med</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#fff;font-size:22px">${timeStr}</div><div class="lbl">Duracao</div></div>`;
    html += `</div>`;

    html += `<div class="stats-grid" style="margin-top:8px">`;
    html += `<div class="stat"><div class="val" style="color:#6e9bff;font-size:22px">${session.power_watts || '—'}</div><div class="lbl">Watts</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#ef4444;font-size:22px">${session.heart_rate || '—'}</div><div class="lbl">FC</div></div>`;
    html += `<div class="stat"><div class="val" style="color:#fbbf24;font-size:22px">${session.speed_kmh ? session.speed_kmh.toFixed(0) : '—'}</div><div class="lbl">km/h</div></div>`;
    html += `</div>`;

    if (session.battery_pct != null) {
      html += `<div style="margin-top:12px;display:flex;justify-content:center;gap:16px;font-size:12px">`;
      html += `<span style="color:#888">Bateria: <span style="color:${session.battery_pct < 20 ? '#ef4444' : '#3fff8b'};font-weight:700">${session.battery_pct}%</span></span>`;
      if (session.range_km) html += `<span style="color:#888">Autonomia: <span style="color:#fbbf24;font-weight:700">${session.range_km.toFixed(0)} km</span></span>`;
      html += `</div>`;
    }

    if (session.elevation_gain_m) {
      html += `<div style="margin-top:6px;text-align:center;font-size:12px;color:#888">Desnivel: <span style="color:#22c55e;font-weight:700">+${Math.round(session.elevation_gain_m)}m</span></div>`;
    }

    html += `</div>`;
  }

  // ── RESCUE NETWORK ──
  const victimLat = session?.lat || p.last_location_lat;
  const victimLng = session?.lng || p.last_location_lng;

  html += `<div class="card" id="rescue-section">`;
  html += `<div class="card-title" style="color:#3fff8b"><span class="icon">&#128161;</span> Rede de Ajuda KROMI</div>`;

  if (nearbyRiders && nearbyRiders.length > 0) {
    html += `<div style="text-align:center;padding:12px 0">`;
    html += `<div style="font-size:48px;font-weight:900;color:#3fff8b">${nearbyRiders.length}</div>`;
    html += `<div style="font-size:13px;color:#adaaaa">ciclista${nearbyRiders.length > 1 ? 's' : ''} disponive${nearbyRiders.length > 1 ? 'is' : 'l'} num raio de 5km</div>`;
    html += `</div>`;
    html += `<button onclick="sendSOS('${esc(p.token)}', '${esc(p.name || 'Ciclista')}', ${victimLat || 0}, ${victimLng || 0})" class="call-btn" style="background:#ff3333;color:white;font-size:18px;height:60px" id="sos-btn">PEDIR AJUDA SOS</button>`;
    html += `<div style="font-size:10px;color:#888;text-align:center;margin-top:6px">Envia um alerta aos ciclistas proximos. Os dados so aparecem se aceitarem ajudar.</div>`;
  } else {
    html += `<div style="text-align:center;padding:12px 0;color:#888;font-size:13px">Nenhum ciclista KROMI detectado num raio de 5km.</div>`;
  }
  html += `<div id="responders"></div>`;
  html += `</div>`;

  // ── Last known location link ──
  if (victimLat && victimLng) {
    html += `<a href="https://maps.google.com/?q=${victimLat},${victimLng}" target="_blank" class="call-btn call-secondary" style="font-size:13px;margin-bottom:12px">Abrir ultima localizacao no Google Maps</a>`;
  }

  // ── Footer ──
  html += `<div class="footer">Esta pagina foi gerada pelo KROMI BikeControl.<br>Dados actualizados a cada sessao de treino. Em emergencia, ligue 112.</div>`;

  document.getElementById('content').innerHTML = html;
}

// ═══════════════════════════════════════════════════════════
// GOOGLE MAPS  (loadGoogleMaps defined after initMap below)
// ═══════════════════════════════════════════════════════════
function initMap(snapshots, session, isLive) {
  const container = document.getElementById('map-container');
  if (!container || !window.google?.maps) return;

  const pts = snapshots.filter(s => s.lat && s.lng);
  if (!pts.length) return;

  const bounds = new google.maps.LatLngBounds();
  pts.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));

  const map = new google.maps.Map(container, {
    center: bounds.getCenter(),
    zoom: 14,
    mapTypeId: 'hybrid',   // satellite + labels
    disableDefaultUI: true,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
  });
  map.fitBounds(bounds, 30);

  // Color-coded polyline segments by HR zone (zone 0 = no HR data → neutral grey)
  // Uses zone-run coalescing: one Polyline per consecutive same-zone run instead of
  // one per segment — reduces ~2000 objects to typically 20-100 for a 2h ride.
  const NEUTRAL_COLOR = '#555555';
  let runStart = 0;
  let runZone = pts[0].hr_zone || 0;
  for (let i = 1; i <= pts.length; i++) {
    const curZone = i < pts.length ? (pts[i].hr_zone || 0) : -1; // sentinel ends last run
    if (curZone !== runZone || i === pts.length) {
      // Emit one polyline for this run (include the first point of the next run as the
      // closing vertex so segments join seamlessly with no gaps).
      const runPts = pts.slice(runStart, Math.min(i + 1, pts.length));
      const color = runZone > 0 ? ZONE_COLORS[Math.min(4, runZone - 1)] : NEUTRAL_COLOR;
      new google.maps.Polyline({
        path: runPts.map(p => ({ lat: p.lat, lng: p.lng })),
        strokeColor: color,
        strokeOpacity: 0.95,
        strokeWeight: 4,
        map,
      });
      runStart = i;
      runZone = curZone;
    }
  }

  // Start marker (green circle)
  new google.maps.Marker({
    position: { lat: pts[0].lat, lng: pts[0].lng },
    map,
    icon: { path: google.maps.SymbolPath.CIRCLE, scale: 7, fillColor: '#3fff8b', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 },
    title: 'Inicio',
    zIndex: 10,
  });

  // Last/current position marker — always RED (emergency context)
  const last = pts[pts.length - 1];
  const lastMarker = new google.maps.Marker({
    position: { lat: last.lat, lng: last.lng },
    map,
    icon: {
      path: google.maps.SymbolPath.CIRCLE,
      scale: 10,
      fillColor: '#ff3333',
      fillOpacity: 1,
      strokeColor: '#fff',
      strokeWeight: 3,
    },
    title: isLive ? 'Posicao actual' : 'Ultima posicao conhecida',
    animation: isLive ? google.maps.Animation.BOUNCE : null,
    zIndex: 20,
  });

  // Accuracy / uncertainty circle around last position
  new google.maps.Circle({
    center: { lat: last.lat, lng: last.lng },
    radius: 30, // estimated GPS uncertainty
    map,
    fillColor: '#ff3333',
    fillOpacity: 0.12,
    strokeColor: '#ff3333',
    strokeOpacity: 0.5,
    strokeWeight: 1.5,
  });

  // Info window on last position (auto-open)
  const info = new google.maps.InfoWindow({
    content: `<div style="color:#000;font-size:12px;padding:4px;min-width:160px"><b style="color:#cc0000">${isLive ? '&#9679; POSICAO ACTUAL' : '&#9678; ULTIMA POSICAO'}</b><br>${last.lat.toFixed(5)}, ${last.lng.toFixed(5)}<br>Alt: ${last.altitude_m ? Math.round(last.altitude_m) + 'm' : '?'} | Vel: ${last.speed_kmh ? last.speed_kmh.toFixed(0) + 'km/h' : '?'}</div>`,
  });
  lastMarker.addListener('click', () => info.open(map, lastMarker));
  info.open(map, lastMarker);

  window._emergencyMap = map;
  window._lastMarker = lastMarker;

  // Search for nearby hospitals and police stations on the map
  if (window.google.maps.places) {
    const service = new google.maps.places.PlacesService(map);
    const center = { lat: last.lat, lng: last.lng };

    const serviceTypes = [
      { type: 'hospital', color: '#ff6666', label: 'H', title: 'Hospital' },
      { type: 'police',   color: '#6699ff', label: 'P', title: 'Policia'  },
    ];

    serviceTypes.forEach(({ type, color, label, title }) => {
      service.nearbySearch({ location: center, radius: 5000, type }, (results, status) => {
        if (status !== google.maps.places.PlacesServiceStatus.OK || !results) return;
        results.slice(0, 3).forEach(place => {
          if (!place.geometry?.location) return;
          const marker = new google.maps.Marker({
            position: place.geometry.location,
            map,
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 8,
              fillColor: color,
              fillOpacity: 0.95,
              strokeColor: '#fff',
              strokeWeight: 2,
            },
            title: `${title}: ${place.name}`,
            zIndex: 5,
          });
          const placeInfo = new google.maps.InfoWindow({
            content: `<div style="color:#000;font-size:11px;padding:3px;max-width:160px"><b>${label === 'H' ? '&#127973;' : '&#128170;'} ${place.name}</b>${place.vicinity ? '<br>' + place.vicinity : ''}</div>`,
          });
          marker.addListener('click', () => placeInfo.open(map, marker));
        });
      });
    });
  }
}

// Load Google Maps with Places library
function loadGoogleMaps() {
  return new Promise((resolve, reject) => {
    if (window.google?.maps) { resolve(); return; }
    const script = document.createElement('script');
    script.src = `https://maps.googleapis.com/maps/api/js?key=${MAPS_KEY}&libraries=geometry,places`;
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
}

// ═══════════════════════════════════════════════════════════
// CANVAS CHARTS
// ═══════════════════════════════════════════════════════════
function setupCanvas(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return null;
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  return { ctx, w: rect.width, h: rect.height };
}

function drawHRTimeline(id, snapshots, hrMax) {
  const c = setupCanvas(id);
  if (!c) return;
  const { ctx, w, h } = c;
  const hrs = snapshots.filter(s => s.hr_bpm > 0);
  if (!hrs.length) return;

  const pad = { top: 10, bottom: 20, left: 35, right: 10 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  const minHR = Math.max(40, Math.min(...hrs.map(s => s.hr_bpm)) - 10);
  const maxHR = Math.min(220, hrMax + 10);
  const maxTime = hrs[hrs.length - 1].elapsed_s;
  const minTime = hrs[0].elapsed_s;
  const timeRange = maxTime - minTime || 1;

  // Zone bands background
  const zoneThresholds = [0, 0.6, 0.7, 0.8, 0.9, 1.0];
  for (let z = 0; z < 5; z++) {
    const lo = maxHR * zoneThresholds[z];
    const hi = maxHR * zoneThresholds[z + 1];
    const y1 = pad.top + ch - ((Math.min(hi, maxHR) - minHR) / (maxHR - minHR)) * ch;
    const y2 = pad.top + ch - ((Math.max(lo, minHR) - minHR) / (maxHR - minHR)) * ch;
    if (y2 > y1) {
      ctx.fillStyle = ZONE_COLORS[z] + '18';
      ctx.fillRect(pad.left, Math.max(pad.top, y1), cw, Math.min(y2 - y1, ch));
    }
  }

  // HR line
  ctx.beginPath();
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  hrs.forEach((s, i) => {
    const x = pad.left + ((s.elapsed_s - minTime) / timeRange) * cw;
    const y = pad.top + ch - ((s.hr_bpm - minHR) / (maxHR - minHR)) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Filled area under line
  const lastPt = hrs[hrs.length - 1];
  ctx.lineTo(pad.left + cw, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();
  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, 'rgba(239,68,68,0.25)');
  grad.addColorStop(1, 'rgba(239,68,68,0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Y-axis labels
  ctx.fillStyle = '#666';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  for (let hr = Math.ceil(minHR / 20) * 20; hr <= maxHR; hr += 20) {
    const y = pad.top + ch - ((hr - minHR) / (maxHR - minHR)) * ch;
    ctx.fillText(hr.toString(), pad.left - 4, y + 3);
    ctx.strokeStyle = '#ffffff10';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + cw, y); ctx.stroke();
  }

  // X-axis time labels
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(timeRange / 5 / 60)) * 60;
  for (let t = Math.ceil(minTime / step) * step; t <= maxTime; t += step) {
    const x = pad.left + ((t - minTime) / timeRange) * cw;
    const m = Math.floor(t / 60);
    ctx.fillText(m + 'min', x, h - 4);
  }
}

function drawHRZones(id, snapshots) {
  const c = setupCanvas(id);
  if (!c) return;
  const { ctx, w, h } = c;

  const counts = [0, 0, 0, 0, 0];
  let total = 0;
  snapshots.forEach(s => {
    if (s.hr_bpm > 0) {
      const z = Math.max(0, Math.min(4, (s.hr_zone || 1) - 1));
      counts[z]++;
      total++;
    }
  });
  if (!total) return;

  let x = 0;
  for (let z = 0; z < 5; z++) {
    const pct = counts[z] / total;
    const segW = pct * w;
    if (segW < 1) { x += segW; continue; }

    ctx.fillStyle = ZONE_COLORS[z];
    ctx.fillRect(x, 0, segW, h);

    // Label if wide enough
    if (segW > 28) {
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(`Z${z + 1}`, x + segW / 2, h / 2 - 2);
      ctx.font = '8px sans-serif';
      ctx.fillText(`${Math.round(pct * 100)}%`, x + segW / 2, h / 2 + 9);
    }
    x += segW;
  }
}

function drawElevation(id, snapshots) {
  const c = setupCanvas(id);
  if (!c) return;
  const { ctx, w, h } = c;

  const pts = snapshots.filter(s => s.altitude_m != null && s.distance_km != null);
  if (pts.length < 2) return;

  const pad = { top: 10, bottom: 20, left: 35, right: 10 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  const minAlt = Math.min(...pts.map(s => s.altitude_m)) - 5;
  const maxAlt = Math.max(...pts.map(s => s.altitude_m)) + 5;
  const altRange = maxAlt - minAlt || 1;
  const minDist = pts[0].distance_km || 0;
  const maxDist = pts[pts.length - 1].distance_km || 1;
  const distRange = maxDist - minDist || 1;

  // Filled area with gradient coloring by gradient_pct
  ctx.beginPath();
  pts.forEach((s, i) => {
    const x = pad.left + ((s.distance_km - minDist) / distRange) * cw;
    const y = pad.top + ch - ((s.altitude_m - minAlt) / altRange) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });

  // Close path for fill
  ctx.lineTo(pad.left + cw, pad.top + ch);
  ctx.lineTo(pad.left, pad.top + ch);
  ctx.closePath();

  const grad = ctx.createLinearGradient(0, pad.top, 0, pad.top + ch);
  grad.addColorStop(0, 'rgba(34,197,94,0.4)');
  grad.addColorStop(0.6, 'rgba(34,197,94,0.15)');
  grad.addColorStop(1, 'rgba(34,197,94,0.02)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Elevation line
  ctx.beginPath();
  pts.forEach((s, i) => {
    const x = pad.left + ((s.distance_km - minDist) / distRange) * cw;
    const y = pad.top + ch - ((s.altitude_m - minAlt) / altRange) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#22c55e';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.stroke();

  // Gradient coloring overlay (red segments for steep climbs)
  for (let i = 1; i < pts.length; i++) {
    const g = pts[i].gradient_pct || 0;
    if (Math.abs(g) < 5) continue;
    const x1 = pad.left + ((pts[i-1].distance_km - minDist) / distRange) * cw;
    const x2 = pad.left + ((pts[i].distance_km - minDist) / distRange) * cw;
    const y1 = pad.top + ch - ((pts[i-1].altitude_m - minAlt) / altRange) * ch;
    const y2 = pad.top + ch - ((pts[i].altitude_m - minAlt) / altRange) * ch;

    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = g > 10 ? '#ef4444' : g > 5 ? '#f59e0b' : g < -10 ? '#3b82f6' : '#6b7280';
    ctx.lineWidth = 2.5;
    ctx.stroke();
  }

  // Y-axis labels (altitude)
  ctx.fillStyle = '#666';
  ctx.font = '9px sans-serif';
  ctx.textAlign = 'right';
  const altStep = Math.max(10, Math.ceil(altRange / 5 / 10) * 10);
  for (let a = Math.ceil(minAlt / altStep) * altStep; a <= maxAlt; a += altStep) {
    const y = pad.top + ch - ((a - minAlt) / altRange) * ch;
    ctx.fillText(Math.round(a) + 'm', pad.left - 4, y + 3);
  }

  // X-axis labels (distance)
  ctx.fillStyle = '#666';
  ctx.textAlign = 'center';
  const distStep = Math.max(0.5, Math.ceil(distRange / 5 * 2) / 2);
  for (let d = Math.ceil(minDist / distStep) * distStep; d <= maxDist; d += distStep) {
    const x = pad.left + ((d - minDist) / distRange) * cw;
    ctx.fillText(d.toFixed(1) + 'km', x, h - 4);
  }
}

function drawPreAccident(hrId, speedId, powerId, snapshots) {
  const lastSnap = snapshots[snapshots.length - 1];
  if (!lastSnap) return;
  const cutoff = lastSnap.elapsed_s - 600;
  const recent = snapshots.filter(s => s.elapsed_s >= cutoff);
  if (recent.length < 3) return;

  drawMiniLine(hrId, recent.map(s => s.hr_bpm || 0), '#ef4444');
  drawMiniLine(speedId, recent.map(s => s.speed_kmh || 0), '#fbbf24');
  drawMiniLine(powerId, recent.map(s => s.power_watts || 0), '#6e9bff');
}

function drawMiniLine(id, values, color) {
  if (values.length < 2) return;
  const c = setupCanvas(id);
  if (!c) return;
  const { ctx, w, h } = c;

  const max = Math.max(...values, 1);
  const min = Math.min(...values, 0);
  const range = max - min || 1;
  const pad = 4;
  const cw = w - pad * 2;
  const ch = h - pad * 2;

  // Filled area
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = pad + (i / (values.length - 1)) * cw;
    const y = pad + ch - ((v - min) / range) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.lineTo(pad + cw, pad + ch);
  ctx.lineTo(pad, pad + ch);
  ctx.closePath();
  ctx.fillStyle = color + '20';
  ctx.fill();

  // Line
  ctx.beginPath();
  values.forEach((v, i) => {
    const x = pad + (i / (values.length - 1)) * cw;
    const y = pad + ch - ((v - min) / range) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.stroke();
}

// ═══════════════════════════════════════════════════════════
// LIVE REFRESH (for active sessions)
// ═══════════════════════════════════════════════════════════
async function refreshLiveData(userId, sessionId) {
  try {
    // Read latest snapshot directly from tracking_sessions (PATCHed every 15s by the PWA)
    const res = await fetch(`${SB_URL}/rest/v1/tracking_sessions?id=eq.${sessionId}&select=lat,lng,speed_kmh,heart_rate,altitude,is_active&limit=1`, { headers: sbHeaders });
    const rows = await res.json();
    if (!rows.length) return false;
    const s = rows[0];
    if (!s.is_active) return false; // Session ended — stop polling
    if (s.lat && s.lng && window._emergencyMap && window._lastMarker) {
      const pos = { lat: s.lat, lng: s.lng };
      window._lastMarker.setPosition(pos);
      window._emergencyMap.panTo(pos);
    }
    return true;
  } catch { return true; } // Keep polling on network errors
}

// ═══════════════════════════════════════════════════════════
// SOS FLOW
// ═══════════════════════════════════════════════════════════
async function sendSOS(token, name, lat, lng) {
  const btn = document.getElementById('sos-btn');
  btn.textContent = 'A ENVIAR SOS...';
  btn.disabled = true;
  btn.style.opacity = '0.6';

  try {
    const res = await fetch(`${SB_URL}/rest/v1/rescue_requests`, {
      method: 'POST',
      headers: { ...sbHeaders, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
      body: JSON.stringify({ emergency_token: token, victim_name: name, victim_lat: lat, victim_lng: lng, status: 'active' }),
    });
    const created = await res.json();
    const requestId = created[0]?.id;

    if (requestId) {
      window._sosRequestId = requestId;
      btn.textContent = 'SOS ENVIADO — A AGUARDAR RESPOSTA';
      btn.style.background = '#ff9933';
      pollResponders(requestId);
    }
  } catch {
    btn.textContent = 'ERRO — TENTE NOVAMENTE';
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

function pollResponders(requestId) {
  const container = document.getElementById('responders');
  const interval = setInterval(async () => {
    try {
      const res = await fetch(`${SB_URL}/rest/v1/rescue_responses?request_id=eq.${requestId}&select=*&order=created_at.asc`, { headers: sbHeaders });
      const responders = await res.json();

      if (responders.length > 0) {
        let html = '<div style="margin-top:16px;border-top:1px solid #262626;padding-top:12px">';
        html += '<div style="font-size:12px;font-weight:700;color:#3fff8b;margin-bottom:8px">AJUDA A CAMINHO!</div>';
        responders.forEach(r => {
          html += '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #262626">';
          html += `<div style="width:40px;height:40px;border-radius:50%;background:#1a3a2a;display:flex;align-items:center;justify-content:center;font-size:18px;color:#3fff8b;font-weight:700">${(r.responder_name || '?')[0]}</div>`;
          html += '<div style="flex:1">';
          html += `<div style="font-size:14px;font-weight:700;color:white">${esc(r.responder_name || 'Ciclista')}</div>`;
          if (r.distance_km) html += `<div style="font-size:11px;color:#888">${r.distance_km}km de distancia</div>`;
          html += '</div>';
          if (r.responder_phone) html += `<a href="tel:${esc(r.responder_phone)}" style="padding:10px 16px;background:#3fff8b;color:#000;font-weight:700;font-size:14px;border-radius:4px;text-decoration:none">LIGAR</a>`;
          html += '</div>';
        });
        html += '</div>';
        container.innerHTML = html;
      }
    } catch {}
  }, 3000);
  setTimeout(() => clearInterval(interval), 2 * 60 * 60 * 1000);
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function showNotFound() {
  document.getElementById('content').innerHTML = `<div class="not-found"><div style="font-size:48px;margin-bottom:16px">&#128722;</div><div>Perfil nao encontrado ou inactivo.</div></div>`;
}

function field(label, value) {
  return `<div class="field"><span class="field-label">${esc(label)}</span><span class="field-value">${esc(String(value || '—'))}</span></div>`;
}

function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML.replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

function calcElevGain(snapshots) {
  let gain = 0;
  const alts = snapshots.filter(s => s.altitude_m != null).map(s => s.altitude_m);
  for (let i = 1; i < alts.length; i++) {
    const diff = alts[i] - alts[i - 1];
    if (diff > 0) gain += diff;
  }
  return Math.round(gain);
}
